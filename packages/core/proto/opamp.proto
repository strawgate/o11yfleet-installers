// Subset of https://github.com/open-telemetry/opamp-spec/blob/main/proto/opamp.proto
// Only messages used by our server are included. Field numbers match the full spec
// so real OpAMP clients (otelcol-contrib, opampsupervisor) are wire-compatible.

syntax = "proto3";

package opamp.proto;

import "anyvalue.proto";

message AgentToServer {
  bytes instance_uid = 1;
  uint64 sequence_num = 2;
  AgentDescription agent_description = 3;
  uint64 capabilities = 4;
  ComponentHealth health = 5;
  EffectiveConfig effective_config = 6;
  RemoteConfigStatus remote_config_status = 7;
  // field 8: PackageStatuses (not implemented)
  AgentDisconnect agent_disconnect = 9;
  uint64 flags = 10;
  // field 11: ConnectionSettingsRequest (not implemented)
  // field 12: CustomCapabilities (not implemented)
  // field 13: CustomMessage (not implemented)
  AvailableComponents available_components = 14;
  // ConnectionSettingsStatus is decoded by the codec but not yet processed by
  // the worker — the server currently ignores the agent's acknowledgement of
  // connection settings offers. See apps/worker TODO for tracking.
  ConnectionSettingsStatus connection_settings_status = 15;
}

message ServerToAgent {
  bytes instance_uid = 1;
  ServerErrorResponse error_response = 2;
  AgentRemoteConfig remote_config = 3;
  ConnectionSettingsOffers connection_settings = 4;
  // field 5: PackagesAvailable (not implemented)
  uint64 flags = 6;
  uint64 capabilities = 7;
  AgentIdentification agent_identification = 8;
  ServerToAgentCommand command = 9;
  // field 10: CustomCapabilities (not implemented)
  // field 11: CustomMessage (not implemented)
  uint64 heart_beat_interval = 12;
}

message AgentDescription {
  repeated KeyValue identifying_attributes = 1;
  repeated KeyValue non_identifying_attributes = 2;
}

message ComponentHealth {
  bool healthy = 1;
  fixed64 start_time_unix_nano = 2;
  string last_error = 3;
  string status = 4;
  fixed64 status_time_unix_nano = 5;
  map<string, ComponentHealth> component_health_map = 6;
}

message EffectiveConfig {
  AgentConfigMap config_map = 1;
}

message AgentConfigMap {
  map<string, AgentConfigFile> config_map = 1;
}

message AgentConfigFile {
  bytes body = 1;
  string content_type = 2;
}

message RemoteConfigStatus {
  bytes last_remote_config_hash = 1;
  RemoteConfigStatuses status = 2;
  string error_message = 3;
}

enum RemoteConfigStatuses {
  RemoteConfigStatuses_UNSET = 0;
  RemoteConfigStatuses_APPLIED = 1;
  RemoteConfigStatuses_APPLYING = 2;
  RemoteConfigStatuses_FAILED = 3;
}

message AgentRemoteConfig {
  AgentConfigMap config = 1;
  bytes config_hash = 2;
}

message ServerErrorResponse {
  ServerErrorResponseType type = 1;
  string error_message = 2;
  RetryInfo retry_info = 3;
}

enum ServerErrorResponseType {
  ServerErrorResponseType_Unknown = 0;
  ServerErrorResponseType_BadRequest = 1;
  ServerErrorResponseType_Unavailable = 2;
}

message RetryInfo {
  uint64 retry_after_nanoseconds = 1;
}

message AgentIdentification {
  bytes new_instance_uid = 1;
}

message AgentDisconnect {}

// ─── Available Components (spec §5.2.2) ─────────────────────────────────────

// Inventory of components an agent has compiled in (receivers/processors/
// exporters/extensions/connectors). Used by the server to validate that
// a config push only references components the agent supports. Spec status
// is "Development" — wire-compatible with otelcol-contrib's OpAMP impl.
message AvailableComponents {
  // Field numbers match upstream opamp-spec for wire compatibility with
  // otelcol-contrib: `components` is field 1, `hash` is field 2.
  map<string, ComponentDetails> components = 1;
  bytes hash = 2;
}

message ComponentDetails {
  repeated KeyValue metadata = 1;
  map<string, ComponentDetails> sub_component_map = 2;
}

// ─── Connection Settings ─────────────────────────────────────────────────────

message ConnectionSettingsOffers {
  bytes hash = 1;
  OpAMPConnectionSettings opamp = 2;
  TelemetryConnectionSettings own_metrics = 3;
  TelemetryConnectionSettings own_traces = 4;
  TelemetryConnectionSettings own_logs = 5;
  // field 6: other_connections (not implemented)
}

// Settings for collector self-telemetry (metrics/traces/logs) export.
message TelemetryConnectionSettings {
  string destination_endpoint = 1;
  Headers headers = 2;
  // field 3: certificate (TLSCertificate, not implemented)
  uint64 heartbeat_interval_seconds = 4;
}

message OpAMPConnectionSettings {
  string destination_endpoint = 1;
  Headers headers = 2;
  // field 3: certificate (TLSCertificate, not implemented)
  uint64 heartbeat_interval_seconds = 4;
}

message Headers {
  repeated Header headers = 1;
}

message Header {
  string key = 1;
  string value = 2;
}

// ─── Commands ────────────────────────────────────────────────────────────────

message ServerToAgentCommand {
  CommandType type = 1;
}

enum CommandType {
  CommandType_Restart = 0;
}

// ─── Connection Settings Status (agent → server) ─────────────────────────────

message ConnectionSettingsStatus {
  bytes last_connection_settings_hash = 1;
  ConnectionSettingsStatuses status = 2;
  string error_message = 3;
}

enum ConnectionSettingsStatuses {
  ConnectionSettingsStatuses_UNSET = 0;
  ConnectionSettingsStatuses_APPLIED = 1;
  ConnectionSettingsStatuses_APPLYING = 2;
  ConnectionSettingsStatuses_FAILED = 3;
}

// ─── Server Capabilities ─────────────────────────────────────────────────────

enum ServerCapabilities {
  ServerCapabilities_Unspecified = 0;
  ServerCapabilities_AcceptsStatus = 0x00000001;
  ServerCapabilities_OffersRemoteConfig = 0x00000002;
  ServerCapabilities_AcceptsEffectiveConfig = 0x00000004;
  // 0x00000008 = OffersPackages (not implemented)
  // 0x00000010 = AcceptsPackagesStatus (not implemented)
  ServerCapabilities_OffersConnectionSettings = 0x00000020;
  // 0x00000040 = AcceptsConnectionSettingsRequest (not implemented)
}

enum ServerToAgentFlags {
  ServerToAgentFlags_Unspecified = 0;
  ServerToAgentFlags_ReportFullState = 0x00000001;
}

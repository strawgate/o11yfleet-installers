\* TLC config for processor.tla — bounded model of the OpAMP state machine.

CONSTANTS
  MaxSeq = 3
  Capabilities = {0, 1, 2}
  ConfigHashes = {"H1", "H2", "no_hash"}
  NoHash = "no_hash"

SPECIFICATION Spec

INVARIANTS
  TypeOK
  DisconnectsAreContiguous
  CurrentHashStable

\* MaxSeq=3 × 3 capabilities × 3 hashes is small enough for TLC to
\* exhaust the state space in seconds. The point isn't broad coverage
\* (property tests do that); the point is to model-check ordering
\* invariants across all interleavings of the 5 modeled actions.
\*
\* `NoSpontaneousReconnect` and the temporal liveness property aren't
\* listed here — they're temporal (use primed variables) and TLC
\* picks them up from the spec definition automatically.

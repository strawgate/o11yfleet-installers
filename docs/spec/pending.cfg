\* TLC model configuration for pending.tla.
\* Run: tlc pending.tla -config pending.cfg

CONSTANTS
  Tenants = {t1, t2}
  Configs = {c1, c2}
  Tokens  = {tok_t1_unscoped, tok_t1_c1, tok_t2_c2}
  Devices = {d1, d2}
  TokenTenant = (
      tok_t1_unscoped :> t1
    @@ tok_t1_c1     :> t1
    @@ tok_t2_c2     :> t2
  )
  TokenScope = (
      tok_t1_unscoped :> "no_scope"
    @@ tok_t1_c1     :> c1
    @@ tok_t2_c2     :> c2
  )

SPECIFICATION Spec

INVARIANTS
  TypeOK
  ClaimsRespectScope
  AssignmentsReferenceDevices
  NoDuplicateClaim
  EveryClaimedDeviceWasConnected

PROPERTIES
  EveryAssignmentEventuallyClaimed

\* The state space is small (2 tenants × 2 configs × 3 tokens × 2 devices)
\* so TLC can exhaustively explore all interleavings in seconds.

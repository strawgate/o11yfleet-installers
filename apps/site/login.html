<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — O11yFleet</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="portal-shared.css" />
  </head>
  <body class="auth">
    <div class="auth-shell">
      <div class="auth-card">
        <a href="index.html" class="brand">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M3 6.5L12 2L21 6.5V13C21 17.5 17 20.5 12 22C7 20.5 3 17.5 3 13V6.5Z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
            />
            <circle cx="12" cy="11" r="2.2" fill="currentColor" />
            <path
              d="M7 11H9.5M14.5 11H17M12 6V8.5M12 13.5V16"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
          O11yFleet
        </a>
        <h1>Sign in to your workspace</h1>
        <p class="sub">Welcome back. Continue with your identity provider, or use email.</p>

        <form id="login-form">
          <button type="button" class="sso-btn" disabled title="Coming soon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3" y="3" width="8" height="8" />
              <rect x="13" y="3" width="8" height="8" />
              <rect x="3" y="13" width="8" height="8" />
              <rect x="13" y="13" width="8" height="8" />
            </svg>
            Continue with SSO
          </button>
          <button type="button" class="sso-btn" disabled title="Coming soon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.22.66-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.6 9.6 0 0 1 12 6.8c.85.004 1.7.115 2.5.337 1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.57.67.48A10 10 0 0 0 22 12c0-5.52-4.48-10-10-10z"
              />
            </svg>
            Continue with GitHub
          </button>
          <div class="divider">OR</div>
          <div
            id="login-error"
            style="
              display: none;
              color: var(--red);
              font-size: 13px;
              margin-bottom: 12px;
              padding: 8px 12px;
              background: rgba(255, 50, 50, 0.1);
              border-radius: 6px;
            "
          ></div>
          <div class="field">
            <label for="email">Work email</label>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="you@company.com"
              autocomplete="email"
              required
            />
          </div>
          <div class="field">
            <div style="display: flex; justify-content: space-between">
              <label for="pw">Password</label>
              <a href="forgot.html" style="font-size: 12.5px; color: var(--accent)">Forgot?</a>
            </div>
            <input id="pw" class="input" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary" style="height: 38px">
            Sign in
          </button>
        </form>

        <div class="foot">Don't have a workspace? <a href="signup.html">Create one</a></div>
      </div>
    </div>
    <script src="portal-api.js"></script>
    <script src="portal-shell.js"></script>
    <script>
      (function () {
        var form = document.getElementById("login-form");
        var btn = document.getElementById("login-btn");
        var errEl = document.getElementById("login-error");

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          errEl.style.display = "none";
          btn.disabled = true;
          btn.textContent = "Signing in…";
          try {
            await FP.login(
              document.getElementById("email").value,
              document.getElementById("pw").value,
            );
            window.location.href = "portal/overview.html";
          } catch (err) {
            errEl.textContent = err.message || "Login failed";
            errEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Sign in";
          }
        });
      })();
    </script>
  </body>
</html>

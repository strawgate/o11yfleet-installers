<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team — O11yFleet</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../portal-shared.css" />
  </head>
  <body>
    <div class="app">
      <div id="shell-sidebar"></div>
      <div id="shell-topbar"></div>
      <main class="main">
        <div class="main-wide">
          <div class="page-head">
            <div>
              <h1>Team</h1>
              <div class="sub">Loading…</div>
            </div>
            <div class="actions">
              <button class="btn btn-primary btn-sm" data-open-modal="invite">Invite member</button>
            </div>
          </div>
          <div class="dt-card">
            <div class="dt-toolbar">
              <span class="count" id="team-count">Loading…</span>
              <div class="spacer"></div>
            </div>
            <table class="dt">
              <thead>
                <tr>
                  <th>Member</th>
                  <th>Role</th>
                  <th>Joined</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="team-rows">
                <tr>
                  <td colspan="4" class="meta" style="text-align: center; padding: 32px">
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <h3 style="font-size: 15px; font-weight: 500; margin: 32px 0 10px">SSO</h3>
          <div
            class="card card-pad"
            style="padding: 18px; display: flex; align-items: center; gap: 14px"
          >
            <div style="flex: 1">
              <div style="font-weight: 500">SAML / OIDC SSO</div>
              <div class="t-muted text-sm mt-2">
                Available on Business and Enterprise. Enforce SSO for everyone in the workspace.
              </div>
            </div>
            <button
              class="btn btn-secondary btn-sm"
              onclick="toast('Coming soon', 'SSO configuration is not yet available.', 'warn')"
            >
              Configure
            </button>
          </div>
        </div>
      </main>
    </div>
    <div class="modal-backdrop" id="invite">
      <div class="modal">
        <div class="modal-head">
          <h3>Invite a member</h3>
          <button class="modal-close" data-close-modal>×</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>Email</label
            ><input class="input" type="email" placeholder="teammate@company.com" />
          </div>
          <div class="field">
            <label>Role</label>
            <select class="select">
              <option>Editor — can change configs</option>
              <option>Admin — manage team & billing</option>
              <option>Viewer — read-only</option>
            </select>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" data-close-modal>Cancel</button>
          <button
            class="btn btn-primary"
            data-close-modal
            onclick="toast('Coming soon', 'Team invitations are not yet available.', 'warn')"
          >
            Send invite
          </button>
        </div>
      </div>
    </div>
    <script src="../portal-api.js"></script>
    <script src="../portal-shell.js"></script>
    <script src="../portal-shell-render.js"></script>
    <script>
      FB.shell({ current: "team", crumbs: [{ label: "Settings" }, { label: "Team" }] });

      (async function () {
        var authed = await FP.checkAuth();
        if (!authed) return;

        var tbody = document.getElementById("team-rows");
        var countEl = document.getElementById("team-count");
        var subEl = document.querySelector(".page-head .sub");

        function esc(s) {
          var d = document.createElement("div");
          d.textContent = s || "";
          return d.innerHTML;
        }

        function initials(name) {
          return name
            .split(" ")
            .map(function (w) {
              return w[0];
            })
            .slice(0, 2)
            .join("")
            .toUpperCase();
        }

        function roleTag(role) {
          if (role === "admin")
            return '<span class="tag" style="border-color:var(--accent-line);color:var(--accent)">Admin</span>';
          return '<span class="tag">Member</span>';
        }

        try {
          var data = await FP.get("/api/v1/team");
          var members = data.members || [];
          countEl.textContent = members.length + " member" + (members.length !== 1 ? "s" : "");
          var plan = (FP.user && FP.user.plan) || "";
          subEl.textContent =
            members.length +
            " member" +
            (members.length !== 1 ? "s" : "") +
            (plan ? " on the " + plan.charAt(0).toUpperCase() + plan.slice(1) + " plan." : ".");

          if (members.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="4" class="meta" style="text-align:center;padding:32px">No team members yet.</td></tr>';
            return;
          }

          tbody.innerHTML = members
            .map(function (m) {
              var name = m.display_name || m.email;
              return (
                "<tr>" +
                '<td><div class="flex-row gap-sm"><span class="avatar">' +
                esc(initials(name)) +
                '</span><div><div class="name">' +
                esc(name) +
                '</div><div class="meta">' +
                esc(m.email) +
                "</div></div></div></td>" +
                "<td>" +
                roleTag(m.role) +
                "</td>" +
                '<td class="meta">' +
                FP.relTime(m.created_at) +
                "</td>" +
                "<td></td>" +
                "</tr>"
              );
            })
            .join("");
        } catch (e) {
          console.error("Failed to load team", e);
          tbody.innerHTML =
            '<tr><td colspan="4" class="meta" style="text-align:center;padding:32px;color:var(--err)">Failed to load team members</td></tr>';
        }
      })();
    </script>
  </body>
</html>

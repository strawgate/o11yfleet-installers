<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plan & billing — O11yFleet</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../portal-shared.css" />
  </head>
  <body>
    <div class="app">
      <div id="shell-sidebar"></div>
      <div id="shell-topbar"></div>
      <main class="main">
        <div class="main-wide">
          <div class="page-head">
            <div>
              <h1>Plan &amp; billing</h1>
              <div class="sub">Loading…</div>
            </div>
          </div>

          <div class="card card-pad" style="padding: 22px; max-width: 600px">
            <div class="t-mono text-sm" style="color: var(--accent)">CURRENT PLAN</div>
            <div style="font-size: 22px; font-weight: 500; margin-top: 4px" id="plan-name">—</div>
            <div class="mt-4" style="display: flex; flex-direction: column; gap: 12px">
              <div class="flex-row justify-between text-sm">
                <span>Managed configurations</span>
                <span class="t-mono" id="billing-configs">— / —</span>
              </div>
              <div class="bar mt-1"><i id="billing-configs-bar" style="width: 0%"></i></div>
            </div>
            <div class="flex-row mt-6" style="gap: 10px">
              <a href="../pricing.html" class="btn btn-ghost btn-sm">Compare plans</a>
            </div>
          </div>

          <div class="card card-pad mt-6" style="padding: 22px; max-width: 600px">
            <div class="t-mono text-sm" style="color: var(--accent)">BILLING</div>
            <div style="padding: 32px 0; text-align: center">
              <div class="t-muted">Billing integration coming soon.</div>
              <div class="t-muted text-sm mt-2">
                Payment methods, invoices, and plan upgrades will be managed here.
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="../portal-api.js"></script>
    <script src="../portal-shell.js"></script>
    <script src="../portal-shell-render.js"></script>
    <script>
      FB.shell({
        current: "billing",
        crumbs: [{ label: "Settings" }, { label: "Plan & billing" }],
      });

      (async function () {
        var authed = await FP.checkAuth();
        if (!authed) return;

        try {
          var tenant = await FP.get("/api/v1/tenant");
          var planName = tenant.plan
            ? tenant.plan.charAt(0).toUpperCase() + tenant.plan.slice(1)
            : "Free";
          document.getElementById("plan-name").textContent = planName;
          document.querySelector(".page-head .sub").innerHTML =
            'You\u2019re on the <strong style="color:var(--fg)">' + planName + "</strong> plan.";

          var overview = await FP.get("/api/v1/overview");
          var max = tenant.max_configs || 0;
          var count = overview.configs_count || 0;
          document.getElementById("billing-configs").textContent = count + " / " + max;
          var bar = document.getElementById("billing-configs-bar");
          if (bar && max > 0) {
            bar.style.width = Math.min(100, Math.round((count / max) * 100)) + "%";
          }
        } catch (e) {
          console.error("Failed to load billing data", e);
        }
      })();
    </script>
  </body>
</html>

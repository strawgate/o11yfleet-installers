<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O11yFleet</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..900&family=Geist+Mono:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set Mantine color scheme before React boots so we don't flash light
      // mode on dark-mode users. Mirrors Mantine's ColorSchemeScript for SSR
      // apps; we're an SPA, so we inline it.
      (function () {
        try {
          var stored = localStorage.getItem("mantine-color-scheme-value") || "dark";
          var scheme = stored;
          if (stored === "auto") {
            scheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-mantine-color-scheme", scheme);
          document.documentElement.setAttribute("data-theme", scheme);
        } catch (e) {
          document.documentElement.setAttribute("data-mantine-color-scheme", "dark");
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plans & pricing — O11yFleet Admin</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../portal-shared.css" />
    <link rel="stylesheet" href="../admin.css" />
  </head>
  <body>
    <div class="admin-stripe"></div>
    <div class="app">
      <div id="shell-sidebar"></div>
      <div id="shell-topbar"></div>
      <main class="main">
        <div class="main-wide">
          <div class="page-head">
            <div>
              <h1>Plans &amp; pricing</h1>
              <div class="sub">
                Plan definitions and tenant distribution. Limits are enforced by the API.
              </div>
            </div>
          </div>

          <div id="plans-loading" class="card card-pad" style="padding: 32px; text-align: center">
            <p class="t-muted" style="font-size: 14px">Loading plans…</p>
          </div>

          <div
            id="plans-grid"
            style="
              display: none;
              grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
              gap: 14px;
            "
          ></div>
        </div>
      </main>
    </div>
    <script src="../portal-api.js"></script>
    <script src="../portal-shell.js"></script>
    <script src="../portal-shell-render.js"></script>
    <script>
      FB.shell({
        role: "admin",
        current: "plans",
        crumbs: [{ label: "Plans" }, { label: "Plans & pricing" }],
      });
    </script>
    <script>
      (async function () {
        var authed = await FP.checkAuth();
        if (!authed) return;

        var planMeta = {
          free: {
            label: "Free",
            color: "",
            desc: "For individuals and small teams getting started",
          },
          pro: {
            label: "Pro",
            color: "border-color: var(--accent-line); color: var(--accent)",
            desc: "For growing teams that need more configs and agents",
          },
          enterprise: {
            label: "Enterprise",
            color: "border-color: var(--accent-line); color: var(--accent)",
            desc: "For large organizations with custom requirements",
          },
        };

        function esc(s) {
          var d = document.createElement("div");
          d.textContent = s || "";
          return d.innerHTML;
        }

        async function loadPlans() {
          var loadingEl = document.getElementById("plans-loading");
          var gridEl = document.getElementById("plans-grid");
          try {
            var data = await FP.get("/api/admin/plans");
            var plans = data.plans || [];
            var html = "";
            plans.forEach(function (p) {
              var meta = planMeta[p.name] || { label: p.name, color: "", desc: "" };
              html +=
                '<div class="card card-pad" style="padding: 22px">' +
                '<div class="flex-row" style="gap: 10px; margin-bottom: 14px">' +
                '<div style="flex: 1">' +
                '<span class="tag"' +
                (meta.color ? ' style="' + meta.color + '"' : "") +
                ">" +
                esc(meta.label) +
                "</span>" +
                "</div>" +
                '<span style="font-size: 22px; font-weight: 600; font-family: var(--font-mono)">' +
                p.tenant_count +
                "</span>" +
                '<span class="t-muted" style="font-size: 13px; align-self: flex-end; margin-bottom: 2px">tenant' +
                (p.tenant_count !== 1 ? "s" : "") +
                "</span>" +
                "</div>" +
                '<p class="t-muted" style="font-size: 13px; margin-bottom: 14px">' +
                esc(meta.desc) +
                "</p>" +
                '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px">' +
                '<div class="stat" style="padding: 10px">' +
                '<div class="label">Max configs</div>' +
                '<div class="val" style="font-size: 18px">' +
                p.max_configs.toLocaleString() +
                "</div>" +
                "</div>" +
                '<div class="stat" style="padding: 10px">' +
                '<div class="label">Max agents / config</div>' +
                '<div class="val" style="font-size: 18px">' +
                p.max_agents_per_config.toLocaleString() +
                "</div>" +
                "</div>" +
                "</div>" +
                "</div>";
            });
            loadingEl.style.display = "none";
            gridEl.style.display = "grid";
            gridEl.innerHTML = html;
          } catch (e) {
            loadingEl.innerHTML =
              '<p style="color: var(--err); font-size: 14px">Failed to load plans: ' +
              esc(e.message) +
              "</p>";
          }
        }

        loadPlans();
      })();
    </script>
  </body>
</html>

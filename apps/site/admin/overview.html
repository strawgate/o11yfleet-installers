<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin overview — O11yFleet</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../portal-shared.css" />
    <link rel="stylesheet" href="../admin.css" />
  </head>
  <body>
    <div class="admin-stripe"></div>
    <div class="app">
      <div id="shell-sidebar"></div>
      <div id="shell-topbar"></div>
      <main class="main">
        <div class="main-wide">
          <div class="page-head">
            <div>
              <h1>Operations overview</h1>
              <div class="sub" id="admin-subtitle">All tenants, all collectors, all events.</div>
            </div>
            <div class="actions">
              <a href="events.html" class="btn btn-secondary btn-sm">Audit events</a
              ><a href="health.html" class="btn btn-primary btn-sm">System health</a>
            </div>
          </div>

          <div class="stat-grid mb-6">
            <div class="stat">
              <div class="label">Tenants</div>
              <div class="val">—</div>
              <div class="delta"></div>
            </div>
            <div class="stat">
              <div class="label">Configurations</div>
              <div class="val">—</div>
              <div class="delta"></div>
            </div>
            <div class="stat">
              <div class="label">Enrollment tokens</div>
              <div class="val">—</div>
              <div class="delta"></div>
            </div>
            <div class="stat">
              <div class="label">Users</div>
              <div class="val">—</div>
              <div class="delta"></div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px">
            <div class="dt-card">
              <div class="dt-toolbar">
                <strong style="font-size: 13.5px">Recent tenants</strong>
                <div class="spacer"></div>
                <a href="tenants.html" class="btn btn-ghost btn-sm">All tenants</a>
              </div>
              <table class="dt">
                <thead>
                  <tr>
                    <th>Tenant</th>
                    <th>Plan</th>
                    <th>Max configs</th>
                    <th>Max agents</th>
                    <th>Created</th>
                  </tr>
                </thead>
                <tbody id="ov-tenant-rows">
                  <tr>
                    <td colspan="5" class="meta" style="text-align: center; padding: 32px">
                      Loading…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="dt-card">
              <div class="dt-toolbar">
                <strong style="font-size: 13.5px">Plan distribution</strong>
              </div>
              <div id="ov-plan-dist" style="padding: 18px">
                <p class="t-muted text-sm">Loading…</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="../portal-api.js"></script>
    <script src="../portal-shell.js"></script>
    <script src="../portal-shell-render.js"></script>
    <script>
      FB.shell({
        role: "admin",
        current: "overview",
        crumbs: [{ label: "Operations" }, { label: "Overview" }],
      });

      (async function () {
        var authed = await FP.checkAuth();
        if (!authed) return;

        // Dynamic subtitle with current date
        var now = new Date();
        var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        var months = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        document.getElementById("admin-subtitle").textContent =
          "All tenants, all collectors, all events. " +
          days[now.getUTCDay()] +
          ", " +
          months[now.getUTCMonth()] +
          " " +
          now.getUTCDate() +
          " · " +
          String(now.getUTCHours()).padStart(2, "0") +
          ":" +
          String(now.getUTCMinutes()).padStart(2, "0") +
          " UTC.";

        try {
          var data = await FP.get("/api/admin/overview");
          var statEls = document.querySelectorAll(".stat-grid .stat");
          if (statEls[0]) {
            statEls[0].querySelector(".val").textContent = data.total_tenants;
            statEls[0].querySelector(".delta").textContent = "";
          }
          if (statEls[1]) {
            statEls[1].querySelector(".val").textContent = data.total_configurations;
            statEls[1].querySelector(".delta").textContent = "configurations";
          }
          if (statEls[2]) {
            statEls[2].querySelector(".val").textContent = data.total_active_tokens;
            statEls[2].querySelector(".delta").textContent = "enrollment tokens";
          }
          if (statEls[3]) {
            statEls[3].querySelector(".val").textContent = data.total_users;
            statEls[3].querySelector(".delta").textContent = "registered users";
          }
        } catch (e) {
          console.error("Failed to load admin overview", e);
          var statEls = document.querySelectorAll(".stat-grid .stat");
          for (var i = 0; i < statEls.length; i++) {
            statEls[i].querySelector(".val").textContent = "!";
            statEls[i].querySelector(".delta").textContent = "load failed";
            statEls[i].querySelector(".delta").style.color = "var(--err)";
          }
        }

        // Load tenant list
        try {
          var tenantData = await FP.get("/api/admin/tenants");
          var tenants = tenantData.tenants || [];
          var tbody = document.getElementById("ov-tenant-rows");
          if (tbody && tenants.length > 0) {
            function esc(s) {
              var d = document.createElement("div");
              d.textContent = s || "";
              return d.innerHTML;
            }
            tbody.innerHTML = tenants
              .slice(0, 10)
              .map(function (t) {
                var planStyle =
                  t.plan === "pro" || t.plan === "enterprise"
                    ? ' style="border-color: var(--accent-line); color: var(--accent);"'
                    : "";
                return (
                  '<tr class="clickable" tabindex="0" role="link" onclick="window.location.href=\'tenant-detail.html?id=' +
                  t.id +
                  "'\" onkeydown=\"if(event.key==='Enter')this.click()\">" +
                  '<td class="name">' +
                  esc(t.name) +
                  "</td>" +
                  '<td><span class="tag"' +
                  planStyle +
                  ">" +
                  esc(t.plan || "free") +
                  "</span></td>" +
                  '<td class="mono-cell">' +
                  (t.max_configs || 0) +
                  "</td>" +
                  '<td class="mono-cell">' +
                  (t.max_agents_per_config || 0).toLocaleString() +
                  "</td>" +
                  '<td class="meta">' +
                  FP.relTime(t.created_at) +
                  "</td></tr>"
                );
              })
              .join("");
          } else if (tbody) {
            tbody.innerHTML =
              '<tr><td colspan="5" class="meta" style="text-align:center;padding:32px;">No tenants yet. <a href="tenants.html">Create one</a>.</td></tr>';
          }
        } catch (e) {
          console.error("Failed to load tenants for overview", e);
          var tbody = document.getElementById("ov-tenant-rows");
          if (tbody)
            tbody.innerHTML =
              '<tr><td colspan="5" class="meta" style="color:var(--err);text-align:center;padding:32px;">Failed to load tenants</td></tr>';
        }

        // Load plan distribution
        try {
          var planData = await FP.get("/api/admin/plans");
          var plans = planData.plans || [];
          var planEl = document.getElementById("ov-plan-dist");
          var total = plans.reduce(function (sum, p) {
            return sum + p.tenant_count;
          }, 0);
          planEl.innerHTML = plans
            .map(function (p) {
              var pct = total > 0 ? Math.round((p.tenant_count / total) * 100) : 0;
              var planStyle =
                p.name === "pro" || p.name === "enterprise"
                  ? ' style="border-color: var(--accent-line); color: var(--accent);"'
                  : "";
              return (
                '<div class="flex-row" style="gap:10px;margin-bottom:12px;align-items:center;">' +
                '<span class="tag"' +
                planStyle +
                ">" +
                esc(p.name) +
                "</span>" +
                '<div style="flex:1;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;">' +
                '<div style="width:' +
                pct +
                '%;height:100%;background:var(--accent);border-radius:4px;"></div></div>' +
                '<span class="t-mono text-sm">' +
                p.tenant_count +
                "</span></div>"
              );
            })
            .join("");
        } catch (e) {
          console.error("Failed to load plan distribution", e);
          var planEl = document.getElementById("ov-plan-dist");
          if (planEl)
            planEl.innerHTML =
              '<p class="t-muted text-sm" style="color:var(--err);">Failed to load plan data</p>';
        }
      })();
    </script>
  </body>
</html>

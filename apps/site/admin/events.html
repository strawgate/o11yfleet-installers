<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit events — O11yFleet Admin</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../portal-shared.css" />
    <link rel="stylesheet" href="../admin.css" />
  </head>
  <body>
    <div class="admin-stripe"></div>
    <div class="app">
      <div id="shell-sidebar"></div>
      <div id="shell-topbar"></div>
      <main class="main">
        <div class="main-wide">
          <div class="page-head">
            <div>
              <h1>Audit events</h1>
              <div class="sub">
                All staff actions and tenant security events. Immutable, retained 2 years.
              </div>
            </div>
          </div>
          <div class="card card-pad" style="padding: 32px; text-align: center">
            <p class="t-muted" style="font-size: 14px">Audit events — coming soon</p>
          </div>
        </div>
      </main>
    </div>
    <script src="../portal-api.js"></script>
    <script src="../portal-shell.js"></script>
    <script src="../portal-shell-render.js"></script>
    <script>
      FB.shell({
        role: "admin",
        current: "events",
        crumbs: [{ label: "Operations" }, { label: "Audit events" }],
      });
      (async function () {
        var authed = await FP.checkAuth();
        if (!authed) return;
      })();
    </script>
  </body>
</html>

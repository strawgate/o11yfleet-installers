<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tenants — O11yFleet Admin</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../portal-shared.css" />
    <link rel="stylesheet" href="../admin.css" />
  </head>
  <body>
    <div class="admin-stripe"></div>
    <div class="app">
      <div id="shell-sidebar"></div>
      <div id="shell-topbar"></div>
      <main class="main">
        <div class="main-wide">
          <div class="page-head">
            <div>
              <h1>Tenants</h1>
              <div class="sub">1,284 workspaces · 38,492 collectors</div>
            </div>
            <div class="actions">
              <button type="button" class="btn btn-secondary btn-sm">Export CSV</button>
              <button
                type="button"
                id="create-tenant-btn"
                class="btn btn-primary btn-sm"
                data-open-modal="create-tenant"
              >
                Create tenant
              </button>
            </div>
          </div>
          <div class="dt-card">
            <div class="dt-toolbar">
              <input
                class="input"
                placeholder="Filter by name, slug, owner email…"
                style="width: 320px; height: 30px"
              />
              <select class="select" style="width: auto; height: 30px">
                <option>All plans</option>
                <option>Free</option>
                <option>Pro</option>
                <option>Business</option>
                <option>Scale</option>
                <option>Enterprise</option>
              </select>
              <select class="select" style="width: auto; height: 30px">
                <option>All statuses</option>
                <option>Trial</option>
                <option>Active</option>
                <option>Past due</option>
                <option>Suspended</option>
              </select>
              <span class="count" style="margin-left: 8px">1,284 tenants</span>
            </div>
            <table class="dt">
              <thead>
                <tr>
                  <th>Workspace</th>
                  <th>Plan</th>
                  <th>Max Configs</th>
                  <th>Max Agents</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody id="trows">
                <tr>
                  <td colspan="5" class="meta" style="text-align: center; padding: 32px">
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <div class="modal-backdrop" id="create-tenant">
      <div class="modal">
        <div class="modal-head">
          <h3>Create tenant</h3>
          <button type="button" class="modal-close" data-close-modal>×</button>
        </div>
        <div class="modal-body">
          <div
            id="ct-error"
            style="
              display: none;
              color: var(--err);
              font-size: 13px;
              margin-bottom: 12px;
              padding: 8px 12px;
              background: rgba(255, 50, 50, 0.1);
              border-radius: 6px;
            "
          ></div>
          <div class="field">
            <label for="ct-name">Tenant name</label>
            <input id="ct-name" class="input" placeholder="e.g. Acme Platform" required />
          </div>
          <div class="field">
            <label for="ct-plan">Plan</label>
            <select id="ct-plan" class="select">
              <option value="free">Free</option>
              <option value="pro">Pro</option>
              <option value="enterprise">Enterprise</option>
            </select>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn btn-ghost" data-close-modal>Cancel</button>
          <button type="button" id="ct-submit" class="btn btn-primary">Create</button>
        </div>
      </div>
    </div>
    <script src="../portal-api.js"></script>
    <script src="../portal-shell.js"></script>
    <script src="../portal-shell-render.js"></script>
    <script>
      FB.shell({
        role: "admin",
        current: "tenants",
        crumbs: [{ label: "Operations" }, { label: "Tenants" }],
      });

      (async function () {
        var authed = await FP.checkAuth();
        if (!authed) return;

        function esc(s) {
          const d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }

        // Bind filter listeners once (outside loadTenants to avoid accumulation)
        var filterInput = document.querySelector(".dt-toolbar .input");
        var planSelect = document.querySelectorAll(".dt-toolbar .select")[0];
        var currentRender = null;
        if (filterInput)
          filterInput.addEventListener("input", function () {
            if (currentRender) currentRender();
          });
        if (planSelect)
          planSelect.addEventListener("change", function () {
            if (currentRender) currentRender();
          });

        async function loadTenants() {
          const tbody = document.getElementById("trows");
          const countEl = document.querySelector(".page-head .sub");
          try {
            const data = await FP.get("/api/admin/tenants");
            const tenants = data.tenants || [];
            if (countEl)
              countEl.textContent =
                tenants.length + " workspace" + (tenants.length !== 1 ? "s" : "");

            function render() {
              let filtered = tenants;
              if (filterInput && filterInput.value) {
                const q = filterInput.value.toLowerCase();
                filtered = filtered.filter(
                  (t) => t.name.toLowerCase().includes(q) || t.id.toLowerCase().includes(q),
                );
              }
              if (planSelect && planSelect.value !== "All plans") {
                const p = planSelect.value.toLowerCase();
                filtered = filtered.filter((t) => t.plan === p);
              }
              document.querySelector(".dt-toolbar .count").textContent =
                filtered.length + " tenants";
              if (filtered.length === 0) {
                tbody.innerHTML =
                  '<tr><td colspan="5" class="meta" style="text-align:center;padding:32px;">No tenants found.</td></tr>';
                return;
              }
              tbody.innerHTML = filtered
                .map((t) => {
                  const planStyle =
                    t.plan === "pro" || t.plan === "enterprise"
                      ? ' style="border-color: var(--accent-line); color: var(--accent);"'
                      : "";
                  return `<tr class="clickable" tabindex="0" role="link" onclick="window.location.href='tenant-detail.html?id=${t.id}'" onkeydown="if(event.key==='Enter')this.click()">
          <td><div class="name">${esc(t.name)}</div><div class="meta">${esc(FP.trunc(t.id, 12))}</div></td>
          <td><span class="tag"${planStyle}>${esc(t.plan)}</span></td>
          <td class="mono-cell">${t.max_configs}</td>
          <td class="mono-cell">${(t.max_agents_per_config || 0).toLocaleString()}</td>
          <td class="meta">${FP.relTime(t.created_at)}</td>
        </tr>`;
                })
                .join("");
            }

            currentRender = render;
            render();
          } catch (e) {
            console.error("Failed to load tenants", e);
            tbody.innerHTML =
              '<tr><td colspan="5" class="meta" style="color:var(--err);text-align:center;padding:32px;">Failed to load tenants</td></tr>';
          }
        }

        FP.autoRefresh(loadTenants, 15000);

        // Create tenant modal
        document.getElementById("ct-submit").addEventListener("click", async function () {
          var btn = this;
          var errEl = document.getElementById("ct-error");
          var name = document.getElementById("ct-name").value.trim();
          var plan = document.getElementById("ct-plan").value;
          errEl.style.display = "none";
          if (!name) {
            errEl.textContent = "Name is required";
            errEl.style.display = "block";
            return;
          }
          btn.disabled = true;
          btn.textContent = "Creating…";
          try {
            var result = await FP.post("/api/admin/tenants", { name: name, plan: plan });
            closeModal("create-tenant");
            document.getElementById("ct-name").value = "";
            toast("Created", "Tenant " + name + " created");
            loadTenants();
          } catch (e) {
            errEl.textContent = e.message || "Failed to create tenant";
            errEl.style.display = "block";
          }
          btn.disabled = false;
          btn.textContent = "Create";
        });
      })();
    </script>
  </body>
</html>

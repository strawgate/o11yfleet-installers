<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FleetPlane Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <style>
    :root {
      --bg: #0a0b0f;
      --surface: #12131a;
      --surface2: #1a1c25;
      --surface3: #22242e;
      --border: #2a2d3a;
      --border-light: #353849;
      --text: #e8eaf0;
      --text-secondary: #9197ad;
      --text-dim: #6b7194;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --accent-bg: rgba(245, 158, 11, 0.08);
      --accent-border: rgba(245, 158, 11, 0.25);
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.1);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.1);
      --yellow: #eab308;
      --yellow-bg: rgba(234, 179, 8, 0.1);
      --blue: #6366f1;
      --blue-bg: rgba(99, 102, 241, 0.08);
      --radius: 8px;
      --radius-lg: 12px;
      --sidebar-w: 240px;
      --header-h: 52px;
      --transition: 150ms ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
    }

    .app { display: flex; height: 100vh; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
    }

    .sidebar-brand .logo { font-size: 20px; }
    .sidebar-brand .name { color: var(--accent); }
    .sidebar-brand .admin-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: var(--accent-bg);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--accent-border);
    }

    .sidebar-nav { padding: 12px 8px; flex: 1; overflow-y: auto; }

    .sidebar-section {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 16px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition);
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
    .nav-item .icon { width: 18px; text-align: center; font-size: 14px; }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .breadcrumbs .sep { color: var(--text-dim); }
    .breadcrumbs .current { color: var(--text); font-weight: 500; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h2 { font-size: 20px; font-weight: 600; }
    .page-header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-card .label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-dim); margin-bottom: 6px;
    }

    .stat-card .value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .card-header h3 { font-size: 14px; font-weight: 600; }
    .card-body { padding: 0; }
    .card-body.padded { padding: 18px; }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-dim); padding: 10px 16px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 16px; font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    tr.clickable { cursor: pointer; transition: background var(--transition); }
    tr.clickable:hover { background: var(--surface2); }
    tr.selected { background: var(--accent-bg) !important; }

    .empty-state { text-align: center; color: var(--text-dim); padding: 40px 16px !important; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.03em;
    }

    .badge-free { background: var(--surface3); color: var(--text-dim); }
    .badge-pro { background: var(--blue-bg); color: var(--blue); }
    .badge-enterprise { background: var(--yellow-bg); color: var(--yellow); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
    }

    .btn:hover { background: var(--surface3); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { background: var(--red-bg); }
    .btn-step-in { background: var(--blue-bg); border-color: rgba(99,102,241,0.3); color: var(--blue); }
    .btn-step-in:hover { background: rgba(99,102,241,0.15); }

    .mono { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 12px; }
    .hash-short { font-family: monospace; font-size: 12px; color: var(--text-secondary); }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface3); border: 1px solid var(--border);
      padding: 10px 18px; border-radius: var(--radius);
      font-size: 13px; z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    dialog {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); color: var(--text);
      padding: 24px; min-width: 400px;
    }

    dialog::backdrop { background: rgba(0,0,0,0.6); }
    dialog h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    dialog label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 4px; margin-top: 12px;
    }

    dialog input, dialog select {
      width: 100%; padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px;
    }

    dialog input:focus, dialog select:focus { border-color: var(--accent); outline: none; }

    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar">
      <div class="sidebar-brand">
        <span class="logo">⚡</span>
        <span class="name">FleetPlane</span>
        <span class="admin-badge">Admin</span>
      </div>
      <div class="sidebar-nav">
        <div class="nav-item active" data-page="tenants" onclick="navigate('tenants')">
          <span class="icon">🏢</span> Tenants
        </div>
        <div class="sidebar-section">System</div>
        <div class="nav-item" data-page="system" onclick="navigate('system')">
          <span class="icon">📡</span> System Health
        </div>
      </div>
    </nav>

    <div class="main-area">
      <div class="top-bar">
        <div class="breadcrumbs">
          <span>Admin</span>
          <span class="sep">›</span>
          <span class="current" id="breadcrumb-page">Tenants</span>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <!-- Create Tenant Dialog -->
  <dialog id="create-tenant-dialog">
    <h3>Create Tenant</h3>
    <label>Name</label>
    <input id="tenant-name" type="text" placeholder="e.g. Acme Corp">
    <label>Plan</label>
    <select id="tenant-plan">
      <option value="free">Free</option>
      <option value="pro">Pro</option>
      <option value="enterprise">Enterprise</option>
    </select>
    <div class="dialog-actions">
      <button class="btn" onclick="document.getElementById('create-tenant-dialog').close()">Cancel</button>
      <button class="btn btn-primary" onclick="createTenant()">Create</button>
    </div>
  </dialog>

  <script>
    let API_URL = localStorage.getItem('fp_admin_api_url') || 'http://localhost:8787';
    let currentPage = 'tenants';
    let selectedTenantId = null;

    function init() {
      const hash = window.location.hash.slice(1);
      if (hash) {
        const parts = hash.split('/');
        currentPage = parts[0] || 'tenants';
        if (parts[1]) selectedTenantId = parts[1];
      }
      navigate(currentPage, false);
    }

    function navigate(page, push = true) {
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
      const names = { tenants: 'Tenants', 'tenant-detail': 'Tenant Detail', system: 'System Health' };
      document.getElementById('breadcrumb-page').textContent = names[page] || page;
      if (push) {
        window.location.hash = page === 'tenant-detail' && selectedTenantId ? `tenant-detail/${selectedTenantId}` : page;
      }
      renderPage(page);
    }

    async function adminApi(path, opts = {}) {
      const url = `${API_URL}/api/admin${path}`;
      const headers = { 'X-Admin': 'true', ...opts.headers };
      const resp = await fetch(url, { ...opts, headers });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        throw new Error(err.error || 'Request failed');
      }
      return resp.json();
    }

    function renderPage(page) {
      const el = document.getElementById('content');
      switch (page) {
        case 'tenants': renderTenants(el); break;
        case 'tenant-detail': renderTenantDetail(el); break;
        case 'system': renderSystem(el); break;
        default: el.innerHTML = '<div class="empty-state">Page not found</div>';
      }
    }

    // ─── Tenants Page ───────────────────────────────────────

    async function renderTenants(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h2>Tenants</h2>
            <div class="subtitle">Manage all tenant accounts</div>
          </div>
          <button class="btn btn-primary" onclick="document.getElementById('create-tenant-dialog').showModal()">+ New Tenant</button>
        </div>
        <div class="stats-row" id="tenant-stats">
          <div class="stat-card"><div class="label">Total Tenants</div><div class="value" id="ts-count">—</div></div>
          <div class="stat-card"><div class="label">Free</div><div class="value" id="ts-free">—</div></div>
          <div class="stat-card"><div class="label">Pro</div><div class="value" id="ts-pro">—</div></div>
          <div class="stat-card"><div class="label">Enterprise</div><div class="value" id="ts-enterprise">—</div></div>
        </div>
        <div class="card">
          <div class="card-body">
            <table>
              <thead><tr><th>Name</th><th>Plan</th><th>ID</th><th>Max Configs</th><th>Max Agents/Config</th><th>Created</th><th></th></tr></thead>
              <tbody id="tenants-tbody"><tr><td colspan="7" class="empty-state">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>`;

      try {
        const { tenants } = await adminApi('/tenants');
        document.getElementById('ts-count').textContent = tenants.length;
        document.getElementById('ts-free').textContent = tenants.filter(t => t.plan === 'free').length;
        document.getElementById('ts-pro').textContent = tenants.filter(t => t.plan === 'pro').length;
        document.getElementById('ts-enterprise').textContent = tenants.filter(t => t.plan === 'enterprise').length;

        const tbody = document.getElementById('tenants-tbody');
        if (tenants.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No tenants yet</td></tr>';
        } else {
          tbody.innerHTML = tenants.map(t => `
            <tr class="clickable" onclick="openTenant('${t.id}')">
              <td><strong>${esc(t.name)}</strong></td>
              <td><span class="badge badge-${t.plan}">${t.plan}</span></td>
              <td><span class="hash-short">${t.id.slice(0, 8)}…</span></td>
              <td>${t.max_configs}</td>
              <td>${(t.max_agents_per_config || 0).toLocaleString()}</td>
              <td>${timeAgo(t.created_at)}</td>
              <td>
                <button class="btn btn-sm btn-step-in" onclick="event.stopPropagation();stepIn('${t.id}')">Step In →</button>
              </td>
            </tr>`).join('');
        }
      } catch (err) { toast('Failed to load tenants: ' + err.message); }
    }

    function openTenant(id) {
      selectedTenantId = id;
      navigate('tenant-detail');
    }

    function stepIn(tenantId) {
      // Open user portal with this tenant ID
      const url = `app.html?tenant=${tenantId}&api=${encodeURIComponent(API_URL)}`;
      window.open(url, '_blank');
    }

    // ─── Tenant Detail ──────────────────────────────────────

    async function renderTenantDetail(el) {
      if (!selectedTenantId) { navigate('tenants'); return; }

      el.innerHTML = `
        <div class="page-header">
          <div>
            <h2 id="td-name">Tenant</h2>
            <div class="subtitle"><span class="mono">${selectedTenantId}</span></div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="navigate('tenants')">← Back</button>
            <button class="btn btn-step-in" onclick="stepIn('${selectedTenantId}')">Step Into Portal →</button>
            <button class="btn btn-danger" onclick="deleteTenant()">Delete</button>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="label">Plan</div><div class="value" id="td-plan" style="font-size:18px">—</div></div>
          <div class="stat-card"><div class="label">Configurations</div><div class="value" id="td-configs">—</div></div>
          <div class="stat-card"><div class="label">Max Configs</div><div class="value" id="td-max-configs">—</div></div>
          <div class="stat-card"><div class="label">Max Agents/Config</div><div class="value" id="td-max-agents" style="font-size:18px">—</div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3>Configurations</h3>
          </div>
          <div class="card-body">
            <table>
              <thead><tr><th>Name</th><th>ID</th><th>Config Hash</th><th>Created</th></tr></thead>
              <tbody id="td-configs-tbody"><tr><td colspan="4" class="empty-state">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>`;

      try {
        const tenant = await adminApi(`/tenants/${selectedTenantId}`);
        document.getElementById('td-name').textContent = tenant.name;
        document.getElementById('td-plan').innerHTML = `<span class="badge badge-${tenant.plan}">${tenant.plan}</span>`;
        document.getElementById('td-max-configs').textContent = tenant.max_configs;
        document.getElementById('td-max-agents').textContent = (tenant.max_agents_per_config || 0).toLocaleString();

        const { configurations } = await adminApi(`/tenants/${selectedTenantId}/configurations`);
        document.getElementById('td-configs').textContent = configurations.length;

        const tbody = document.getElementById('td-configs-tbody');
        if (configurations.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No configurations</td></tr>';
        } else {
          tbody.innerHTML = configurations.map(c => `
            <tr>
              <td><strong>${esc(c.name)}</strong></td>
              <td><span class="hash-short">${c.id.slice(0, 8)}…</span></td>
              <td><span class="hash-short">${c.current_config_hash ? c.current_config_hash.slice(0, 16) : '—'}</span></td>
              <td>${timeAgo(c.created_at)}</td>
            </tr>`).join('');
        }
      } catch (err) { toast('Failed to load tenant: ' + err.message); }
    }

    // ─── System Health ──────────────────────────────────────

    async function renderSystem(el) {
      el.innerHTML = `
        <div class="page-header">
          <div>
            <h2>System Health</h2>
            <div class="subtitle">Platform-wide health monitoring</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="label">API Status</div><div class="value" id="sys-status" style="font-size:18px">Checking…</div></div>
          <div class="stat-card"><div class="label">Total Tenants</div><div class="value" id="sys-tenants">—</div></div>
        </div>`;

      try {
        const resp = await fetch(`${API_URL}/healthz`);
        const data = await resp.json();
        document.getElementById('sys-status').innerHTML = data.status === 'ok'
          ? '<span style="color:var(--green)">● Healthy</span>'
          : '<span style="color:var(--red)">● Unhealthy</span>';
      } catch {
        document.getElementById('sys-status').innerHTML = '<span style="color:var(--red)">● Unreachable</span>';
      }

      try {
        const { tenants } = await adminApi('/tenants');
        document.getElementById('sys-tenants').textContent = tenants.length;
      } catch { /* ok */ }
    }

    // ─── Actions ────────────────────────────────────────────

    async function createTenant() {
      const name = document.getElementById('tenant-name').value.trim();
      const plan = document.getElementById('tenant-plan').value;
      if (!name) { toast('Name required'); return; }
      try {
        const result = await adminApi('/tenants', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, plan }),
        });
        document.getElementById('create-tenant-dialog').close();
        document.getElementById('tenant-name').value = '';
        toast('Tenant created');
        openTenant(result.id);
      } catch (err) { toast(err.message); }
    }

    async function deleteTenant() {
      if (!confirm('Delete this tenant? This cannot be undone.')) return;
      try {
        const url = `${API_URL}/api/admin/tenants/${selectedTenantId}`;
        const resp = await fetch(url, { method: 'DELETE', headers: { 'X-Admin': 'true' } });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: 'Failed' }));
          throw new Error(err.error);
        }
        toast('Tenant deleted');
        navigate('tenants');
      } catch (err) { toast(err.message); }
    }

    // ─── Utilities ──────────────────────────────────────────

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '—';
      const sec = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
      if (sec < 0) return 'just now';
      if (sec < 60) return sec + 's ago';
      if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
      if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
      return Math.floor(sec / 86400) + 'd ago';
    }

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.slice(1);
      const parts = hash.split('/');
      const page = parts[0] || 'tenants';
      if (parts[1]) selectedTenantId = parts[1];
      if (page !== currentPage || page === 'tenant-detail') navigate(page, false);
    });

    init();
  </script>
</body>
</html>

name: AI Guidance Live Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-guidance-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-guidance-audit:
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 20
    # AI_GUIDANCE_MINIMAX_API_KEY is intentionally NOT in this job-wide
    # env block. Job env is inherited by every step including
    # `pnpm install --frozen-lockfile`, where a malicious lifecycle
    # script in any transitive dependency could read it. The secret is
    # scoped at step level on the two steps that actually need it.
    env:
      FP_URL: http://127.0.0.1:8787
      UI_URL: http://127.0.0.1:3000
      LIVE_AI_GUIDANCE: "1"
      AI_GUIDANCE_PROVIDER: minimax
      AI_GUIDANCE_MODEL: MiniMax-M2.7
      AI_GUIDANCE_BASE_URL: https://api.minimax.io/v1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check live AI secret
        id: live-secret
        shell: bash
        env:
          AI_GUIDANCE_MINIMAX_API_KEY: ${{ secrets.AI_GUIDANCE_MINIMAX_API_KEY }}
        run: |
          if [ -z "${AI_GUIDANCE_MINIMAX_API_KEY:-}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AI_GUIDANCE_MINIMAX_API_KEY is not configured; skipping live AI guidance check."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browser
        if: steps.live-secret.outputs.available == 'true'
        run: pnpm --filter @o11yfleet/ui-tests exec playwright install chromium

      - name: Run live AI guidance audit
        if: steps.live-secret.outputs.available == 'true'
        env:
          AI_GUIDANCE_AUDIT_DIR: test-results/ai-guidance-audit
          AI_GUIDANCE_MINIMAX_API_KEY: ${{ secrets.AI_GUIDANCE_MINIMAX_API_KEY }}
        run: bash scripts/run-ai-guidance-audit.sh 20

      - name: Upload AI guidance audit artifacts
        if: always() && steps.live-secret.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-guidance-live-audit
          path: |
            test-results/ai-guidance-audit
            tests/ui/playwright-report
            tests/ui/test-results
          if-no-files-found: ignore
          retention-days: 3

name: AI Guidance Live Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-guidance-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-guidance-audit:
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 20
    env:
      FP_URL: http://127.0.0.1:8787
      UI_URL: http://127.0.0.1:3000
      LIVE_AI_GUIDANCE: "1"
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      LLM_PROVIDER: minimax
      LLM_MODEL: MiniMax-M2.7
      LLM_BASE_URL: https://api.minimax.io/v1
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check live AI secret
        shell: bash
        run: |
          if [ -z "${MINIMAX_API_KEY:-}" ]; then
            echo "::error::MINIMAX_API_KEY is required for the AI Guidance Live Audit."
            exit 1
          fi

      - name: Install Playwright browser
        run: pnpm --filter @o11yfleet/ui-tests exec playwright install chromium

      - name: Run live AI guidance audit
        env:
          AI_GUIDANCE_AUDIT_DIR: test-results/ai-guidance-audit
        run: bash scripts/run-ai-guidance-audit.sh 20

      - name: Upload AI guidance audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-guidance-live-audit
          path: |
            test-results/ai-guidance-audit
            tests/ui/playwright-report
            tests/ui/test-results
          if-no-files-found: ignore
          retention-days: 3

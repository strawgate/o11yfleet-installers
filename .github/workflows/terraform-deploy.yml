name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/terraform-deploy.yml"
      - "infra/terraform/**"
      - "justfile"
      - "apps/site/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/terraform-deploy.yml"
      - "infra/terraform/**"
      - "justfile"
      - "apps/site/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment to plan or apply"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
      apply:
        description: "Apply after planning"
        required: true
        default: false
        type: boolean

concurrency:
  group: terraform-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# Workflow-level env holds only non-secret config. Cloud-provider
# secrets (TFSTATE_WORKER_PASSWORD, CLOUDFLARE_API_TOKEN) are scoped at
# job level on the plan and apply jobs only — the validate job runs
# offline tf-validate and never needs them.
env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # tfstate-worker (Terraform HTTP backend with proper LOCK/UNLOCK on R2).
  # See infra/tfstate-worker/ for the Worker source.
  TFSTATE_WORKER_URL: ${{ vars.TFSTATE_WORKER_URL }}

jobs:
  validate:
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: "1.9"

      - uses: ./.github/actions/setup-just

      - name: Validate Terraform
        run: just tf-validate

  plan:
    needs: [validate]
    if: >-
      ${{
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        vars.TERRAFORM_REMOTE_STATE_ENABLED == 'true'
      }}
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      TFSTATE_USERNAME: ${{ secrets.TFSTATE_WORKER_USERNAME }}
      TFSTATE_PASSWORD: ${{ secrets.TFSTATE_WORKER_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: "1.9"

      - uses: ./.github/actions/setup-just

      - name: Select environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Check remote state configuration
        id: remote-state
        run: |
          missing=()
          [ -n "$TFSTATE_WORKER_URL" ] || missing+=(TFSTATE_WORKER_URL)
          [ -n "$TFSTATE_USERNAME" ] || missing+=(TFSTATE_WORKER_USERNAME)
          [ -n "$TFSTATE_PASSWORD" ] || missing+=(TFSTATE_WORKER_PASSWORD)
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=(CLOUDFLARE_DEPLOY_API_TOKEN)
          if [ "${#missing[@]}" -gt 0 ]; then
            names="$(IFS=', '; echo "${missing[*]}")"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "::notice::Skipping Terraform plan because deployment settings are not configured: ${names}"
              echo "configured=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Missing required Terraform deployment settings: ${names}"
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Terraform plan
        id: plan
        if: ${{ steps.remote-state.outputs.configured == 'true' }}
        run: |
          # Tee the plan to a file for the PR-comment step. `set -o pipefail`
          # is on (justfile uses bash -e) so the recipe's exit status flows
          # through; we don't suppress it.
          set -o pipefail
          mkdir -p /tmp/tf-plan
          just tf-plan ${{ steps.target.outputs.env }} 2>&1 | tee /tmp/tf-plan/output.txt

      - name: Post Terraform plan comment on PR
        if: >-
          ${{
            steps.remote-state.outputs.configured == 'true' &&
            github.event_name == 'pull_request' &&
            always()
          }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PLAN_ENV: ${{ steps.target.outputs.env }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('node:fs');
            const env = process.env.PLAN_ENV || 'prod';
            const outcome = process.env.PLAN_OUTCOME || 'unknown';
            const marker = `<!-- terraform-plan-${env} -->`;

            // GitHub comments cap at 65,536 characters. Reserve headroom for
            // the marker, summary, fences, and details tags.
            const MAX_BODY = 60000;
            let plan = '';
            try {
              plan = fs.readFileSync('/tmp/tf-plan/output.txt', 'utf8');
            } catch (err) {
              plan = `(plan output not captured: ${err.message})`;
            }
            // Strip ANSI color codes terraform always emits even with --no-color
            // when run under tee.
            plan = plan.replace(/\x1b\[[0-9;]*m/g, '');
            let truncated = false;
            if (plan.length > MAX_BODY) {
              plan = plan.slice(-MAX_BODY);
              truncated = true;
            }
            const icon = outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⚠️';
            const trunkNote = truncated ? '\n\n*Output truncated to last 60k chars; see job logs for full output.*' : '';
            const body = [
              marker,
              `### ${icon} Terraform plan — \`${env}\` (${outcome})`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```',
              plan.trim(),
              '```',
              '',
              '</details>' + trunkNote,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  apply:
    needs: [plan]
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.TERRAFORM_PRODUCTION_APPLY_ENABLED == 'true') ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.apply &&
          github.ref == 'refs/heads/main' &&
          (
            inputs.environment != 'prod' ||
            vars.TERRAFORM_PRODUCTION_APPLY_ENABLED == 'true'
          )
        )
      }}
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 10
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment != 'prod' && inputs.environment || 'production' }}
    env:
      TFSTATE_USERNAME: ${{ secrets.TFSTATE_WORKER_USERNAME }}
      TFSTATE_PASSWORD: ${{ secrets.TFSTATE_WORKER_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: "1.9"

      - uses: ./.github/actions/setup-just

      - name: Select environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Check production imports
        if: ${{ steps.target.outputs.env == 'prod' }}
        run: just tf-check-staging-readiness prod

      - name: Sync installer
        if: ${{ !contains(toJSON(github.event.commits.*.message), '[skip site]') }}
        run: |
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.sh -o apps/site/public/install.sh
          chmod +x apps/site/public/install.sh
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.ps1 -o apps/site/public/install.ps1

      - name: Build site
        if: ${{ !contains(toJSON(github.event.commits.*.message), '[skip site]') }}
        run: just site-build ${{ steps.target.outputs.env }}

      - name: Terraform apply
        run: just tf-apply ${{ steps.target.outputs.env }}

      - name: Deploy site
        if: ${{ !contains(toJSON(github.event.commits.*.message), '[skip site]') }}
        run: just deploy-site ${{ steps.target.outputs.env }}

name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/terraform-deploy.yml"
      - "infra/terraform/**"
      - "justfile"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/terraform-deploy.yml"
      - "infra/terraform/**"
      - "justfile"
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment to plan or apply"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
      apply:
        description: "Apply after planning"
        required: true
        default: false
        type: boolean

concurrency:
  group: terraform-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_STATE_R2_BUCKET: ${{ vars.TERRAFORM_STATE_R2_BUCKET }}
  TERRAFORM_STATE_R2_ENDPOINT: ${{ vars.TERRAFORM_STATE_R2_ENDPOINT }}
  TERRAFORM_STATE_R2_REGION: ${{ vars.TERRAFORM_STATE_R2_REGION || 'auto' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_STATE_R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_STATE_R2_SECRET_ACCESS_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
  TERRAFORM_PROVIDER_V5_STATE_READY: ${{ vars.TERRAFORM_PROVIDER_V5_STATE_READY }}

jobs:
  validate:
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - uses: taiki-e/install-action@just

      - name: Validate Terraform
        run: just tf-validate

  plan:
    needs: [validate]
    if: >-
      ${{
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        vars.TERRAFORM_REMOTE_STATE_ENABLED == 'true' &&
        (
          github.event_name == 'pull_request' ||
          vars.TERRAFORM_PROVIDER_V5_STATE_READY == 'true' ||
          github.event_name == 'workflow_dispatch'
        )
      }}
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - uses: taiki-e/install-action@just

      - name: Select environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Check remote state configuration
        id: remote-state
        run: |
          missing=()
          [ -n "$TERRAFORM_STATE_R2_BUCKET" ] || missing+=(TERRAFORM_STATE_R2_BUCKET)
          [ -n "$TERRAFORM_STATE_R2_ENDPOINT" ] || missing+=(TERRAFORM_STATE_R2_ENDPOINT)
          [ -n "$AWS_ACCESS_KEY_ID" ] || missing+=(TERRAFORM_STATE_R2_ACCESS_KEY_ID)
          [ -n "$AWS_SECRET_ACCESS_KEY" ] || missing+=(TERRAFORM_STATE_R2_SECRET_ACCESS_KEY)
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=(CLOUDFLARE_DEPLOY_API_TOKEN)
          if [ "${#missing[@]}" -gt 0 ]; then
            names="$(IFS=', '; echo "${missing[*]}")"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "::notice::Skipping Terraform plan because deployment settings are not configured: ${names}"
              echo "configured=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Missing required Terraform deployment settings: ${names}"
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Terraform plan
        if: ${{ steps.remote-state.outputs.configured == 'true' }}
        run: |
          if [ "$TERRAFORM_PROVIDER_V5_STATE_READY" != "true" ]; then
            just tf-plan-empty-state ${{ steps.target.outputs.env }}
          else
            just tf-plan ${{ steps.target.outputs.env }}
          fi

  apply:
    needs: [plan]
    if: >-
      ${{
        vars.TERRAFORM_PROVIDER_V5_STATE_READY == 'true' &&
        (
          (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.TERRAFORM_PRODUCTION_APPLY_ENABLED == 'true') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply && vars.TERRAFORM_PRODUCTION_APPLY_ENABLED == 'true')
        )
      }}
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 10
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment != 'prod' && inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - uses: taiki-e/install-action@just

      - name: Select environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Check production imports
        if: ${{ steps.target.outputs.env == 'prod' }}
        run: just tf-check-prod-imports prod

      - name: Terraform apply
        run: just tf-apply ${{ steps.target.outputs.env }}

name: Deploy Site to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Site environment to deploy.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: pages-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubicloud-standard-2-arm
    environment: ${{ inputs.environment == 'prod' && 'production' || inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Sync installer from o11yfleet-installers (canonical source with CI)
        run: |
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.sh -o apps/site/public/install.sh
          chmod +x apps/site/public/install.sh
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.ps1 -o apps/site/public/install.ps1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: taiki-e/install-action@just

      - name: Build site
        run: just site-build ${{ inputs.environment }}

      - name: Deploy Pages projects
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEPLOY_ACCOUNT_ID }}
        run: just pages-deploy ${{ inputs.environment }}

      - name: Smoke test Pages targets
        run: |
          while IFS= read -r target; do
            [ -n "$target" ] || continue
            surface="${target%%|*}"
            url="${target#*|}"
            STATUS=$(curl -sS --connect-timeout 5 --max-time 20 -o /tmp/pages-smoke.html -w "%{http_code}" "$url" || true)
            if [ "$STATUS" != "200" ]; then
              echo "$surface smoke failed: $STATUS"
              cat /tmp/pages-smoke.html
              exit 1
            fi
            grep 'id="root"' /tmp/pages-smoke.html >/dev/null
          done < <(just --quiet env-pages-smoke-targets ${{ inputs.environment }})

name: Deploy Site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Sync installer from o11yfleet-installers (canonical source with CI)
        run: |
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.sh -o apps/site/public/install.sh
          chmod +x apps/site/public/install.sh
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.ps1 -o apps/site/public/install.ps1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @o11yfleet/site run build

      - name: Deploy and smoke test Pages projects
        uses: ./.github/actions/deploy-pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          projects: |
            o11yfleet-site
            o11yfleet-app
            o11yfleet-admin
          smoke-targets: |
            site|https://o11yfleet-site.pages.dev/
            app|https://o11yfleet-app.pages.dev/portal/overview
            admin|https://o11yfleet-admin.pages.dev/admin/overview

name: Deploy Site to Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Site environment to deploy.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: site-${{ inputs.environment }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard-branch:
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 5
    steps:
      - name: Require main branch for shared environments
        run: test "${{ github.ref }}" = "refs/heads/main"

  deploy:
    needs: guard-branch
    runs-on: ubicloud-standard-2-arm
    environment: ${{ inputs.environment == 'prod' && 'production' || inputs.environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TFSTATE_WORKER_URL: ${{ vars.TFSTATE_WORKER_URL }}
      TFSTATE_USERNAME: ${{ secrets.TFSTATE_WORKER_USERNAME }}
      TFSTATE_PASSWORD: ${{ secrets.TFSTATE_WORKER_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEPLOY_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sync installer from o11yfleet-installers (canonical source with CI)
        run: |
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.sh -o apps/site/public/install.sh
          chmod +x apps/site/public/install.sh
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.ps1 -o apps/site/public/install.ps1

      - uses: ./.github/actions/setup-deploy

      - name: Build site
        run: just site-build ${{ inputs.environment }}

      - name: Deploy static site Worker
        run: just tf-apply-site ${{ inputs.environment }}

      - name: Resolve site smoke targets
        id: site-smoke
        run: |
          {
            echo 'targets<<TARGETS'
            just --quiet env-site-smoke-targets ${{ inputs.environment }}
            echo 'TARGETS'
          } >> "$GITHUB_OUTPUT"

      - name: Smoke test site targets
        uses: ./.github/actions/smoke-site
        with:
          smoke-targets: ${{ steps.site-smoke.outputs.targets }}

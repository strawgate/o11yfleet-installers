name: Deploy Site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Sync installer from o11yfleet-installers (canonical source with CI)
        run: |
          curl -sL https://raw.githubusercontent.com/o11yfleet/o11yfleet-installers/main/installers/install.sh -o apps/site/public/install.sh
          chmod +x apps/site/public/install.sh

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @o11yfleet/site run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/site/dist --project-name o11yfleet-site --commit-dirty=true

      - name: Smoke test site
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://o11yfleet-site.pages.dev/)
          if [ "$STATUS" != "200" ]; then
            echo "Site health check failed: $STATUS"
            exit 1
          fi
          PORTAL_HTML=$(curl -fsS https://o11yfleet-site.pages.dev/portal/overview)
          echo "$PORTAL_HTML" | grep 'id="root"' >/dev/null
          if echo "$PORTAL_HTML" | grep -E 'Prototype|AI-powered insights are coming soon|portal-shared\.css' >/dev/null; then
            echo "Portal route served stale prototype HTML"
            exit 1
          fi
          echo "✓ Site deployed and responding"

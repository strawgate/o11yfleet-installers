name: Deploy Site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/site --project-name o11yfleet-site --commit-dirty=true

      - name: Smoke test site
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://o11yfleet-site.pages.dev/)
          if [ "$STATUS" != "200" ]; then
            echo "Site health check failed: $STATUS"
            exit 1
          fi
          echo "✓ Site deployed and responding"

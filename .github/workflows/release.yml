name: Release Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test jobs (deploy only)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: "22"

jobs:
  test:
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & typecheck
        run: pnpm turbo lint typecheck

      - name: Run all tests
        run: pnpm turbo test

  deploy-worker:
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy worker to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --env=""

      - name: Run D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: d1 migrations apply FP_DB --remote

      - name: Smoke test production
        run: |
          WORKER_URL="https://api.o11yfleet.com"
          echo "=== Health check ==="
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/healthz")
            if [ "$STATUS" = "200" ]; then break; fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed after 5 attempts: $STATUS"
            exit 1
          fi
          echo "✓ Health check passed"

          echo "=== API smoke: create tenant ==="
          API_SECRET="${{ secrets.API_SECRET }}"
          SEED_RESP=$(curl -s -X POST "$WORKER_URL/auth/seed" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET")
          TENANT_ID=$(echo "$SEED_RESP" | jq -r '.tenantId')
          if [ "$TENANT_ID" = "null" ] || [ -z "$TENANT_ID" ]; then
            echo "Failed to seed: $SEED_RESP"
            exit 1
          fi
          echo "✓ Demo tenant: $TENANT_ID"

          echo "=== API smoke: create config (v1) ==="
          CONFIG=$(curl -s -X POST "$WORKER_URL/api/v1/configurations" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -d '{"name":"ci-release-config"}')
          CONFIG_ID=$(echo "$CONFIG" | jq -r '.id')
          if [ "$CONFIG_ID" = "null" ] || [ -z "$CONFIG_ID" ]; then
            echo "Failed to create config: $CONFIG"
            exit 1
          fi
          echo "✓ Created config: $CONFIG_ID"

          echo "=== API smoke: create enrollment token (v1) ==="
          TOKEN_RESP=$(curl -s -X POST "$WORKER_URL/api/v1/configurations/$CONFIG_ID/enrollment-token" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -d '{"label":"ci-release"}')
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.token')
          if [ -z "$TOKEN" ] || ! echo "$TOKEN" | grep -q "^fp_enroll_"; then
            echo "Failed to create enrollment token: $TOKEN_RESP"
            exit 1
          fi
          echo "✓ Created enrollment token"

          echo "=== API smoke: config stats (v1) ==="
          HTTP_STATUS=$(curl -s -o /tmp/stats.json -w "%{http_code}" "$WORKER_URL/api/v1/configurations/$CONFIG_ID/stats" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Stats endpoint failed: HTTP $HTTP_STATUS"
            cat /tmp/stats.json
            exit 1
          fi
          echo "Stats: $(cat /tmp/stats.json)"
          echo "✓ Stats endpoint responding"

          echo "✓ Production smoke tests passed"

  deploy-site:
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @o11yfleet/site run build

      - name: Deploy site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/site/dist --project-name o11yfleet-site --commit-dirty=true

      - name: Smoke test site
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://o11yfleet.com/)
          if [ "$STATUS" != "200" ]; then
            echo "Site smoke test failed: $STATUS"
            exit 1
          fi
          PORTAL_HTML=$(curl -fsS https://app.o11yfleet.com/portal/overview)
          echo "$PORTAL_HTML" | grep 'id="root"' >/dev/null
          if echo "$PORTAL_HTML" | grep -E 'Prototype|AI-powered insights are coming soon|portal-shared\.css' >/dev/null; then
            echo "Portal route served stale prototype HTML"
            exit 1
          fi
          echo "✓ Site deployed and responding"

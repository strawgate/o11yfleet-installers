name: Deploy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod
      require_state_ready:
        description: Require existing Terraform state/imports before deploying.
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  guard-branch:
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 5
    steps:
      - name: Require main branch for shared environments
        run: test "${{ github.ref }}" = "refs/heads/main"

  deploy:
    needs: guard-branch
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    env:
      # Per-environment TFSTATE worker URL (isolated per environment)
      TFSTATE_WORKER_URL: ${{ vars.TFSTATE_WORKER_URL }}
      TFSTATE_USERNAME: ${{ secrets.TFSTATE_USERNAME }}
      TFSTATE_PASSWORD: ${{ secrets.TFSTATE_PASSWORD }}
      # TERRAFORM_DEPLOY_TOKEN: Workers Write, D1 Write, R2 Write, DNS Write, Workers Routes Write (apply/deploy)
      CLOUDFLARE_API_TOKEN: ${{ secrets.TERRAFORM_DEPLOY_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AUTO_PROVISION_WORKER_SECRETS: "true"
      O11YFLEET_API_BEARER_SECRET: ${{ secrets.O11YFLEET_API_BEARER_SECRET }}
      O11YFLEET_CLAIM_HMAC_SECRET: ${{ secrets.O11YFLEET_CLAIM_HMAC_SECRET }}
      O11YFLEET_SEED_TENANT_USER_EMAIL: ${{ secrets.O11YFLEET_SEED_TENANT_USER_EMAIL }}
      O11YFLEET_SEED_TENANT_USER_PASSWORD: ${{ secrets.O11YFLEET_SEED_TENANT_USER_PASSWORD }}
      O11YFLEET_SEED_ADMIN_EMAIL: ${{ secrets.O11YFLEET_SEED_ADMIN_EMAIL }}
      O11YFLEET_SEED_ADMIN_PASSWORD: ${{ secrets.O11YFLEET_SEED_ADMIN_PASSWORD }}
      AI_GUIDANCE_MINIMAX_API_KEY: ${{ secrets.AI_GUIDANCE_MINIMAX_API_KEY }}
      TERRAFORM_PRODUCTION_APPLY_ENABLED: ${{ vars.TERRAFORM_PRODUCTION_APPLY_ENABLED }}
      REQUIRE_TERRAFORM_STATE_READY: ${{ inputs.require_state_ready }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-deploy

      - name: Check deployment configuration
        run: |
          test -n "$TFSTATE_WORKER_URL"
          test -n "$TFSTATE_USERNAME"
          test -n "$TFSTATE_PASSWORD"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$O11YFLEET_API_BEARER_SECRET"
          test -n "$O11YFLEET_CLAIM_HMAC_SECRET"
          test -n "$O11YFLEET_SEED_TENANT_USER_EMAIL"
          test -n "$O11YFLEET_SEED_TENANT_USER_PASSWORD"
          test -n "$O11YFLEET_SEED_ADMIN_EMAIL"
          test -n "$O11YFLEET_SEED_ADMIN_PASSWORD"

          if [ "${{ inputs.environment }}" = "prod" ]; then
            test "$TERRAFORM_PRODUCTION_APPLY_ENABLED" = "true"
          fi

      - name: Deploy environment
        run: just deploy ${{ inputs.environment }}

      - name: Resolve site smoke targets
        id: site-smoke
        run: |
          {
            echo 'targets<<TARGETS'
            just --quiet env-site-smoke-targets ${{ inputs.environment }}
            echo 'TARGETS'
          } >> "$GITHUB_OUTPUT"

      - name: Smoke test site
        uses: ./.github/actions/smoke-site
        with:
          smoke-targets: ${{ steps.site-smoke.outputs.targets }}

      - name: Smoke test API
        uses: ./.github/actions/smoke-api
        with:
          environment: ${{ inputs.environment }}
          origin: ${{ inputs.environment == 'prod' && 'https://o11yfleet.com' || format('https://{0}.o11yfleet.com', inputs.environment) }}
          config-name: ci-${{ inputs.environment }}-config
          token-label: ci-${{ inputs.environment }}
        env:
          O11YFLEET_API_BEARER_SECRET: ${{ secrets.O11YFLEET_API_BEARER_SECRET }}
          O11YFLEET_SEED_ADMIN_EMAIL: ${{ secrets.O11YFLEET_SEED_ADMIN_EMAIL }}
          O11YFLEET_SEED_ADMIN_PASSWORD: ${{ secrets.O11YFLEET_SEED_ADMIN_PASSWORD }}

      - name: Smoke test public aliases
        run: just smoke-aliases-ci ${{ inputs.environment }}

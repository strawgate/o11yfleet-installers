name: Installer CI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "apps/installer-ts/**"
  pull_request:
    paths:
      - "apps/installer-ts/**"

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }} + Node ${{ matrix.node }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runner: ubuntu-latest
            node: "22"
          - os: macos
            runner: macos-latest
            node: "22"
          - os: windows
            runner: windows-latest
            node: "22"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @o11yfleet/installer-ts typecheck

      - name: Run tests
        run: pnpm --filter @o11yfleet/installer-ts test

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'ubuntu'
        with:
          name: coverage
          path: apps/installer-ts/coverage/

  test-docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: node:20-alpine
          - image: node:22-alpine
          - image: node:20-bullseye
          - image: node:22-bullseye
    container:
      image: ${{ matrix.image }}
      env:
        PNPM_HOME: /pnpm
        PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @o11yfleet/installer-ts typecheck

      - name: Run tests
        run: pnpm --filter @o11yfleet/installer-ts test

  build:
    name: Build installer bundle
    runs-on: ubuntu-latest
    needs: [test, test-docker]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundle
        run: |
          pnpm --filter @o11yfleet/installer-ts build
          ls -la apps/installer-ts/dist/

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-bundle
          path: apps/installer-ts/dist/
          retention-days: 7

name: Installer CI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "apps/installer/**"
      - ".github/workflows/installer-ci.yml"
  pull_request:
    paths:
      - "apps/installer/**"
      - ".github/workflows/installer-ci.yml"

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }} + Node ${{ matrix.node }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runner: ubuntu-latest
            node: "22"
          - os: macos
            runner: macos-latest
            node: "22"
          - os: windows
            runner: windows-latest
            node: "22"
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm --filter @o11yfleet/installer typecheck

      - name: Run tests
        run: pnpm --filter @o11yfleet/installer test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu'
        with:
          name: coverage
          path: apps/installer/coverage/

  test-node-versions:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        node: ["20"]
        include:
          - os: ubuntu
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm --filter @o11yfleet/installer typecheck

      - name: Run tests
        run: pnpm --filter @o11yfleet/installer test

  test-docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: node:20-alpine
          - image: node:22-alpine
          - image: node:20-bullseye
          - image: node:22-bullseye
    container:
      image: ${{ matrix.image }}
      env:
        PNPM_HOME: /pnpm
        PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm --filter @o11yfleet/installer typecheck

      - name: Run tests
        run: pnpm --filter @o11yfleet/installer test

  build:
    name: Build installer bundle
    runs-on: ubuntu-latest
    needs: [test, test-node-versions, test-docker]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build bundle
        run: |
          pnpm --filter @o11yfleet/installer build
          ls -la apps/installer/dist/

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: installer-bundle
          path: apps/installer/dist/
          retention-days: 7

  build-binary:
    name: Build portable binary (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: ubuntu-latest
          - os: linux-arm64
            runner: ubuntu-latest
          - os: darwin-x64
            runner: macos-latest
          - os: darwin-arm64
            runner: macos-latest
          - os: windows-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | BUN_INSTALL=/root/.bun bash
          echo "/root/.bun/bin" >> $GITHUB_PATH

      - name: Build portable binary
        run: |
          /root/.bun/bin/bun install --no-frozen-lockfile
          /root/.bun/bin/bun run --filter @o11yfleet/installer build:binary
          ls -la apps/installer/dist/

      - name: Rename binary for platform
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-x64" ]; then EXT=".exe"; fi
          mv apps/installer/dist/o11yinstaller "apps/installer/dist/o11yinstaller-${{ matrix.os }}${EXT}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: o11yinstaller-${{ matrix.os }}
          path: apps/installer/dist/o11yinstaller-${{ matrix.os }}*
          retention-days: 7

  test-integration:
    name: Integration test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs: [build-binary]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: ubuntu-latest
          - os: linux-arm64
            runner: ubuntu-latest
          - os: darwin-x64
            runner: macos-latest
          - os: darwin-arm64
            runner: macos-latest
          - os: windows-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: o11yinstaller-${{ matrix.os }}
          path: ./bin/

      - name: Make executable (Unix)
        if: matrix.os != 'windows-x64'
        run: chmod +x ./bin/o11yinstaller-${{ matrix.os }}

      - name: Test --help
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-x64" ]; then EXT=".exe"; fi
          ./bin/o11yinstaller-${{ matrix.os }}${EXT} --help | grep -q "O11yFleet"

      - name: Test --version
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-x64" ]; then EXT=".exe"; fi
          ./bin/o11yinstaller-${{ matrix.os }}${EXT} --version | grep -q "o11yinstaller"

      - name: Test scan command (no auth needed)
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-x64" ]; then EXT=".exe"; fi
          ./bin/o11yinstaller-${{ matrix.os }}${EXT} scan --json | grep -q "collectors"

      - name: Test install --dry-run (downloads collector, no service)
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-x64" ]; then EXT=".exe"; fi
          ./bin/o11yinstaller-${{ matrix.os }}${EXT} install --token fp_enroll_test_placeholder --dry-run --skip-service --json 2>&1 | grep -q "Dry run"

      - name: Test enroll command help
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-x64" ]; then EXT=".exe"; fi
          ./bin/o11yinstaller-${{ matrix.os }}${EXT} enroll --help | grep -q "enroll"

name: Import Prod Resources

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_STATE_R2_BUCKET: ${{ vars.TERRAFORM_STATE_R2_BUCKET }}
  TERRAFORM_STATE_R2_ENDPOINT: ${{ vars.TERRAFORM_STATE_R2_ENDPOINT }}
  TERRAFORM_STATE_R2_REGION: ${{ vars.TERRAFORM_STATE_R2_REGION || 'auto' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  import-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - uses: taiki-e/install-action@just

      - name: Terraform init remote
        run: just tf-init-remote prod

      - name: Import resources
        run: |
          cd infra/terraform

          echo "=== Importing cloudflare_worker.fleet ==="
          if terraform state show "cloudflare_worker.fleet" >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              cloudflare_worker.fleet \
              "417e8c0fd8f1a64e9f2c4845afa6dc56/o11yfleet-worker"
          fi

          echo ""
          echo "=== Importing cloudflare_dns_record.api ==="
          if terraform state show "cloudflare_dns_record.api" >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              "cloudflare_dns_record.api" \
              "2650adcd696a6e400201a68323e90c5e/6a4c27a938e75523570a7d8d2fbbb140"
          fi

          echo ""
          echo "=== Importing cloudflare_dns_record.site (admin) ==="
          if terraform state show 'cloudflare_dns_record.site["admin"]' >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              'cloudflare_dns_record.site["admin"]' \
              "2650adcd696a6e400201a68323e90c5e/952a7166fde37597293e51a052e5d5ad"
          fi

          echo ""
          echo "=== Importing cloudflare_dns_record.site (app) ==="
          if terraform state show 'cloudflare_dns_record.site["app"]' >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              'cloudflare_dns_record.site["app"]' \
              "2650adcd696a6e400201a68323e90c5e/ee52377c6ef3402ddbeb99d4e5257d06"
          fi

          echo ""
          echo "=== Importing cloudflare_dns_record.site (site) ==="
          if terraform state show 'cloudflare_dns_record.site["site"]' >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              'cloudflare_dns_record.site["site"]' \
              "2650adcd696a6e400201a68323e90c5e/d01b0cbe9b13f41b3b5576ba902132b1"
          fi

          echo ""
          echo "=== Importing cloudflare_workers_route.api ==="
          if terraform state show "cloudflare_workers_route.api" >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              "cloudflare_workers_route.api" \
              "2650adcd696a6e400201a68323e90c5e/f04d7e7161514559806187706d345826"
          fi

          echo ""
          echo "=== Importing cloudflare_workers_cron_trigger.fleet ==="
          if terraform state show "cloudflare_workers_cron_trigger.fleet" >/dev/null 2>&1; then
            echo "Already imported"
          else
            terraform import -var-file=envs/prod.tfvars \
              "cloudflare_workers_cron_trigger.fleet" \
              "417e8c0fd8f1a64e9f2c4845afa6dc56/o11yfleet-worker"
          fi

          echo ""
          echo "=== cloudflare_queue_consumer.events ==="
          echo "! Does not support import in Cloudflare provider v5"
          echo "! Will be managed by Terraform apply"

      - name: Verify imports
        run: |
          cd infra/terraform
          echo "=== Checking Terraform state ==="
          echo ""
          echo "--- Resources that should be in state ---"
          for resource in "cloudflare_d1_database.fleet" "cloudflare_r2_bucket.configs" "cloudflare_queue.events"; do
            if terraform state show "$resource" >/dev/null 2>&1; then
              echo "✓ $resource"
            else
              echo "✗ $resource NOT FOUND"
            fi
          done
          echo ""
          echo "--- Resources imported this run ---"
          for resource in "cloudflare_dns_record.api" 'cloudflare_dns_record.site["admin"]' 'cloudflare_dns_record.site["app"]' 'cloudflare_dns_record.site["site"]' "cloudflare_worker.fleet" "cloudflare_workers_cron_trigger.fleet" "cloudflare_workers_route.api"; do
            if terraform state show "$resource" >/dev/null 2>&1; then
              echo "✓ $resource"
            else
              echo "✗ $resource NOT FOUND"
            fi
          done
          echo ""
          echo "--- Resources created by Terraform apply ---"
          echo "ℹ cloudflare_queue_consumer.events (does not support import)"
          echo "ℹ cloudflare_queue_consumer.events will be created during apply"

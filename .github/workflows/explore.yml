name: "Explore: Site UX"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/workflows/explore.yml"
      - "apps/site/**"
      - "apps/worker/**"
      - "packages/core/**"
      - "packages/db/**"
      - "tests/ui/**"
      - "scripts/**"
      - "justfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: write

concurrency:
  group: explore-site-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run:
    if: ${{ (github.event_name == 'workflow_dispatch' || vars.ENABLE_EXPLORE_AGENT == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@db3664201d22626d0c5126c447b0a8cf76d8a38d
    with:
      title-prefix: "[explore-site]"
      setup-commands: |
        pnpm install --frozen-lockfile
        pnpm --filter @o11yfleet/ui-tests exec playwright install chromium
        bash scripts/serve-explore.sh 55
      additional-instructions: |
        You are the **o11yFleet Site UX Explorer**. Your job is to interactively
        explore the live o11yFleet app and report real user-facing defects in the
        public site, tenant portal, and admin portal.

        You are not a deterministic E2E test runner. Do NOT write Playwright
        specs, do NOT add Node.js browser-driving scripts, and do NOT run
        `playwright test` as your exploration. Use Playwright MCP browser tools
        directly (`browser_navigate`, `browser_resize`, `browser_snapshot`,
        `browser_click`, `browser_type`, `browser_take_screenshot`,
        `browser_console_execute`, etc.). If MCP browser tools are unavailable,
        use `playwright-cli` interactively one command at a time and inspect the
        page state after each action before deciding the next action.

        ## Local app

        The setup step starts a seeded local stack:

        - Site: `http://127.0.0.1:3000`
        - Worker API: `http://localhost:8787`
        - Tenant login: `demo@o11yfleet.com` / `demo-password`
        - Admin login: `admin@o11yfleet.com` / `admin-password`
        - 55 fake collectors are started so agent-list pagination and search
          can be exercised with more than one page of results.

        Use `?api=http://localhost:8787` on login URLs if the UI does not pick
        up the local API automatically.

        ## Required viewport passes

        Explore at all three viewports. Resize interactively and adapt based on
        what you see:

        1. Mobile: `390x844`
        2. Laptop: `1440x900`
        3. 4K desktop: `3840x2160`

        For each viewport, check for horizontal overflow, clipped controls,
        overlapping text, unreadable tables, off-screen menus, awkward empty
        states, broken scrolling, and console/page errors. Use screenshots only
        as evidence for findings or notable verification points.

        ## Surfaces to cover

        Public site:
        - `/`
        - `/about`
        - `/pricing`
        - `/enterprise`
        - `/partners`
        - `/product/configuration-management`
        - `/solutions/gitops`
        - `/login`
        - `/admin/login`

        Tenant portal:
        - Sign in through `/login?api=http://localhost:8787`
        - Visit overview, configurations, a configuration detail page, agents,
          a paginated agent list, an agent detail page, enrollment tokens,
          team, billing, and settings.
        - Exercise agent search, pagination next/previous, row/detail
          navigation, breadcrumbs, and refresh/navigation away and back.

        Admin portal:
        - Sign in through `/admin/login?api=http://localhost:8787`
        - Visit overview, tenants, tenant detail, impersonation, health, usage,
          support, plans, API reference, and the Durable Object viewer.
        - Exercise tenant impersonation back into the portal and confirm it is
          obvious which context you are in.

        ## What to look for

        Focus on defects a user would care about:

        - Broken navigation, broken forms, failed login/impersonation flows, or
          dead buttons.
        - Runtime exceptions, console errors, failed API calls that surface in
          the UI, or loading states that never resolve.
        - Responsive layout failures at the required viewports, especially
          horizontal overflow on mobile and giant empty or unreadable layouts on
          4K.
        - Tables that do not remain scannable, controls that are too small to
          tap, and text that does not fit its container.
        - Confusing admin-vs-tenant affordances, especially around login and
          impersonation.

        Do not report prompt drift as a product bug. If the UI is healthy but
        this prompt describes it incorrectly, include a **Prompt Suggestions**
        section instead.

        ## Output rules

        Complete all required viewport passes and cover all three surfaces before
        posting. Do not stop after the first finding.

        If this is a pull request run, post one PR comment with your results.
        If this is a manual workflow run and you found real defects, create one
        issue. If you found no defects in a manual run, use the noop tool.

        Your report must include:

        - A concise verdict.
        - The viewports and surfaces you actually explored.
        - Your mental model of how the public site, tenant portal, admin portal,
          configuration pages, and agent pages fit together.
        - Findings as a numbered list. For each finding include page/location,
          viewport, what you tried, expected behavior, actual behavior, and
          screenshot or console evidence when available.
        - A short list of flows that looked healthy, so reviewers know what was
          covered.
        - Prompt Suggestions, if this workflow should be updated to better match
          the current UI.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

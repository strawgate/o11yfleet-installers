name: CI Monitor

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  report-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on CI failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"

          FAILED_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | "- **\(.name)**: \(.html_url)"' 2>/dev/null || echo "Failed to fetch job details")

          BODY_FILE="$(mktemp)"
          trap 'rm -f "$BODY_FILE"' EXIT
          cat > "$BODY_FILE" <<EOF
          ## CI Failure on main

          The [CI workflow]($RUN_URL) failed.

          | Field | Value |
          |-------|-------|
          | **Run ID** | $RUN_ID |
          | **Workflow** | $WORKFLOW_NAME |
          | **Triggered by** | @$ACTOR |
          | **Run URL** | [View run]($RUN_URL) |

          ### Failed Jobs

          $FAILED_JOBS

          ---
          *This issue was automatically created by the CI Monitor workflow.*
          EOF

          gh issue create \
            --repo ${{ github.repository }} \
            --title "CI failed on main: $WORKFLOW_NAME" \
            --label "ci-failure" \
            --label "automated-issue" \
            --assignee "$ACTOR" \
            --body-file "$BODY_FILE"

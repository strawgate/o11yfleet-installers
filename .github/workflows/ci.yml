name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Format check
        run: pnpm prettier --check .

      - name: Type check
        run: pnpm turbo typecheck

   test:
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4

       - uses: pnpm/action-setup@v4
         with:
           version: ${{ env.PNPM_VERSION }}

       - uses: actions/setup-node@v4
         with:
           node-version: ${{ env.NODE_VERSION }}
           cache: pnpm

       - name: Install dependencies
         run: pnpm install --frozen-lockfile

       - name: Core tests (codec, state machine, auth)
         run: pnpm --filter @o11yfleet/core test

       - name: Worker tests (workerd runtime)
         run: pnpm --filter @o11yfleet/worker test

       - name: Web app tests
         run: pnpm --filter @o11yfleet/web test

  bundle-and-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build worker bundle
        run: |
          cd apps/worker
          npx wrangler deploy --dry-run --outdir dist 2>&1 | tail -20 || true

      - name: "Check bundle size (CI budget: 3MB compressed)"
        run: |
          BUNDLE=$(find apps/worker/dist -name '*.js' -o -name '*.mjs' 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "⚠ No bundle found — skipping size check"
            exit 0
          fi
          RAW_SIZE=$(wc -c < "$BUNDLE" | tr -d ' ')
          GZIP_SIZE=$(gzip -c "$BUNDLE" | wc -c | tr -d ' ')
          echo "Bundle: $BUNDLE"
          echo "Raw size: $((RAW_SIZE / 1024)) KB"
          echo "Gzip size: $((GZIP_SIZE / 1024)) KB"
          MAX_GZIP=$((3 * 1024 * 1024))
          if [ "$GZIP_SIZE" -gt "$MAX_GZIP" ]; then
            echo "❌ Bundle exceeds 3MB compressed budget ($((GZIP_SIZE / 1024)) KB)"
            exit 1
          fi
          echo "✓ Bundle size OK"

      - name: Terraform validate
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Validate Terraform
        run: |
          cd infra/terraform
          terraform init -backend=false
          terraform validate

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: pnpm tsx experiments/src/benchmark.ts 2>&1 | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  deploy-staging:
    needs: [lint-and-typecheck, test, bundle-and-terraform]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to staging
        run: pnpm --filter @o11yfleet/worker exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migrations (staging)
        run: pnpm --filter @o11yfleet/worker exec wrangler d1 migrations apply FP_DB --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          WORKER_URL="${{ vars.STAGING_WORKER_URL }}"
          echo "=== Health check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/healthz")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "✓ Health check passed"

          echo "=== API smoke: create tenant ==="
          TENANT=$(curl -s -X POST "$WORKER_URL/api/tenants" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-smoke-test"}')
          TENANT_ID=$(echo "$TENANT" | jq -r '.id')
          if [ "$TENANT_ID" = "null" ] || [ -z "$TENANT_ID" ]; then
            echo "Failed to create tenant: $TENANT"
            exit 1
          fi
          echo "✓ Created tenant: $TENANT_ID"

          echo "=== API smoke: create config ==="
          CONFIG=$(curl -s -X POST "$WORKER_URL/api/configurations" \
            -H "Content-Type: application/json" \
            -d "{\"tenant_id\":\"$TENANT_ID\",\"name\":\"ci-smoke-config\"}")
          CONFIG_ID=$(echo "$CONFIG" | jq -r '.id')
          if [ "$CONFIG_ID" = "null" ] || [ -z "$CONFIG_ID" ]; then
            echo "Failed to create config: $CONFIG"
            exit 1
          fi
          echo "✓ Created config: $CONFIG_ID"

          echo "=== API smoke: create enrollment token ==="
          TOKEN_RESP=$(curl -s -X POST "$WORKER_URL/api/configurations/$CONFIG_ID/enrollment-token" \
            -H "Content-Type: application/json" \
            -d '{"label":"ci-smoke"}')
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.token')
          if [ -z "$TOKEN" ] || ! echo "$TOKEN" | grep -q "^fp_enroll_"; then
            echo "Failed to create enrollment token: $TOKEN_RESP"
            exit 1
          fi
          echo "✓ Created enrollment token"

          echo "=== API smoke: config stats ==="
          STATS=$(curl -s "$WORKER_URL/api/configurations/$CONFIG_ID/stats")
          echo "Stats: $STATS"
          echo "✓ Stats endpoint responding"

          echo ""
          echo "✓ All staging smoke tests passed"

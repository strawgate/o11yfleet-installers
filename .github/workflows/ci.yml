name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Lint repo scripts
        run: pnpm lint:scripts

      - name: Dev-check script tests
        run: pnpm test:dev-check

      - name: Format check
        run: pnpm prettier --check .

      - name: Worker typegen drift check
        run: pnpm --filter @o11yfleet/worker typegen:check

      - name: Type check
        run: pnpm turbo typecheck

  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Core tests (codec, state machine, auth)
        run: pnpm --filter @o11yfleet/core test

      - name: Site tests
        run: pnpm --filter @o11yfleet/site test

  test-slow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Worker tests (workerd runtime)
        run: pnpm --filter @o11yfleet/worker test:runtime

      - name: Install Playwright browser
        run: pnpm --filter @o11yfleet/ui-tests exec playwright install --with-deps chromium

      - name: Run UI tests
        run: pnpm --filter @o11yfleet/ui-tests test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            tests/ui/playwright-report
            tests/ui/test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build worker bundle
        run: |
          cd apps/worker
          npx wrangler deploy --dry-run --outdir dist 2>&1 | tail -20 || true

      - name: "Check bundle size (Workers limit: 10MB compressed)"
        run: |
          MAX_GZIP=0
          MAX_BUNDLE=""
          MAX_RAW=0
          for BUNDLE in $(find apps/worker/dist \( -name '*.js' -o -name '*.mjs' \) 2>/dev/null); do
            RAW=$(wc -c < "$BUNDLE" | tr -d ' ')
            GZ=$(gzip -c "$BUNDLE" | wc -c | tr -d ' ')
            echo "Bundle: $BUNDLE  Raw: $((RAW / 1024)) KB  Gzip: $((GZ / 1024)) KB"
            if [ "$GZ" -gt "$MAX_GZIP" ]; then
              MAX_GZIP=$GZ
              MAX_BUNDLE=$BUNDLE
              MAX_RAW=$RAW
            fi
          done
          if [ -z "$MAX_BUNDLE" ]; then
            echo "⚠ No bundle found — skipping size check"
            exit 0
          fi
          echo ""
          echo "Largest bundle: $MAX_BUNDLE"
          echo "Raw size: $((MAX_RAW / 1024)) KB  |  Gzip: $((MAX_GZIP / 1024)) KB"
          if [ "$MAX_GZIP" -gt $((3 * 1024 * 1024)) ]; then
            echo "❌ Bundle exceeds 3MB compressed budget ($((MAX_GZIP / 1024)) KB)"
            exit 1
          fi
          echo "✓ Bundle size OK"

      - name: Terraform validate
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
      - run: |
          cd infra/terraform
          terraform init -backend=false
          terraform validate

  deploy-staging:
    needs: [lint-typecheck, test-fast, test-slow, deploy-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to staging
        run: pnpm --filter @o11yfleet/worker exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migrations (staging)
        run: pnpm --filter @o11yfleet/worker exec wrangler d1 migrations apply FP_DB --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          WORKER_URL="${{ vars.STAGING_WORKER_URL }}"
          API_SECRET="${{ secrets.API_SECRET }}"

          echo "=== Health check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/healthz")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "✓ Health check passed"

          echo "=== Seed demo tenant ==="
          SEED_RESP=$(curl -s -X POST "$WORKER_URL/auth/seed" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET")
          TENANT_ID=$(echo "$SEED_RESP" | jq -r '.tenantId')
          if [ "$TENANT_ID" = "null" ] || [ -z "$TENANT_ID" ]; then
            echo "Failed to seed: $SEED_RESP"
            exit 1
          fi
          echo "✓ Demo tenant: $TENANT_ID"

          echo "=== API smoke: create config (v1) ==="
          CONFIG=$(curl -s -X POST "$WORKER_URL/api/v1/configurations" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -d '{"name":"ci-smoke-config"}')
          CONFIG_ID=$(echo "$CONFIG" | jq -r '.id')
          if [ "$CONFIG_ID" = "null" ] || [ -z "$CONFIG_ID" ]; then
            echo "Failed to create config: $CONFIG"
            exit 1
          fi
          echo "✓ Created config: $CONFIG_ID"

          echo "=== API smoke: create enrollment token (v1) ==="
          TOKEN_RESP=$(curl -s -X POST "$WORKER_URL/api/v1/configurations/$CONFIG_ID/enrollment-token" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -d '{"label":"ci-smoke"}')
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.token')
          if [ -z "$TOKEN" ] || ! echo "$TOKEN" | grep -q "^fp_enroll_"; then
            echo "Failed to create enrollment token: $TOKEN_RESP"
            exit 1
          fi
          echo "✓ Created enrollment token"

          echo "=== API smoke: config stats (v1) ==="
          HTTP_STATUS=$(curl -s -o /tmp/stats.json -w "%{http_code}" "$WORKER_URL/api/v1/configurations/$CONFIG_ID/stats" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Stats endpoint failed: HTTP $HTTP_STATUS"
            cat /tmp/stats.json
            exit 1
          fi
          echo "Stats: $(cat /tmp/stats.json)"
          echo "✓ Stats endpoint responding"

          echo ""
          echo "✓ All staging smoke tests passed"

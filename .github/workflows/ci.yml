name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      node: ${{ steps.filter.outputs.node }}
      fast: ${{ steps.filter.outputs.fast }}
      slow: ${{ steps.filter.outputs.slow }}
      deploy: ${{ steps.filter.outputs.deploy }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="${HEAD}^"
            fi
          else
            BASE="${{ github.sha }}^"
            HEAD="${{ github.sha }}"
          fi

          git diff --name-only "$BASE" "$HEAD" > changed-files.txt
          cat changed-files.txt

          has_match() {
            local pattern
            for pattern in "$@"; do
              if grep -Eq "$pattern" changed-files.txt; then
                return 0
              fi
            done
            return 1
          }

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          if has_match \
            '^(apps/(site|worker)|packages|tests|scripts|experiments)/' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig[^/]*\.json|eslint\.config\.js|vitest[^/]*\.config\.)' \
            '^justfile$'; then
            set_output node true
          else
            set_output node false
          fi

          if has_match \
            '^(apps/site|packages/core|packages/test-utils|scripts)/' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig[^/]*\.json|eslint\.config\.js)' \
            '^justfile$'; then
            set_output fast true
          else
            set_output fast false
          fi

          if has_match \
            '^(apps/worker|packages/core|packages/db|packages/test-utils|tests/ui|tests/e2e)/' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig[^/]*\.json|eslint\.config\.js|vitest[^/]*\.config\.)' \
            '^justfile$'; then
            set_output slow true
          else
            set_output slow false
          fi

          if has_match \
            '^apps/worker/' \
            '^infra/terraform/' \
            '^justfile$' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json)'; then
            set_output deploy true
          else
            set_output deploy false
          fi

          if has_match '^\.github/workflows/.*\.(yml|yaml)$' '^\.github/workflows/.*\.md$' '^\.github/actions/'; then
            set_output workflow true
          else
            set_output workflow false
          fi

  lint-typecheck:
    needs: [changes]
    if: needs.changes.outputs.node == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflows
        if: needs.changes.outputs.workflow == 'true'
        run: |
          find .github/workflows -name '*.yml' ! -name '*.lock.yml' -print0 |
            xargs -0 go run github.com/rhysd/actionlint/cmd/actionlint@latest

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.node == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.node == 'true'
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        if: needs.changes.outputs.node == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: needs.changes.outputs.node == 'true'
        run: pnpm turbo lint

      - name: Lint repo scripts
        if: needs.changes.outputs.node == 'true'
        run: pnpm lint:scripts

      - name: Dev-check script tests
        if: needs.changes.outputs.node == 'true'
        run: pnpm test:dev-check

      - name: Format check
        if: needs.changes.outputs.node == 'true'
        run: pnpm prettier --cache --cache-location node_modules/.cache/prettier/.prettier-cache --check .

      - name: Worker typegen drift check
        if: needs.changes.outputs.node == 'true'
        run: pnpm --filter @o11yfleet/worker typegen:check

      - name: Type check
        if: needs.changes.outputs.node == 'true'
        run: pnpm turbo typecheck

  test-fast:
    needs: [changes]
    if: needs.changes.outputs.fast == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Core tests (codec, state machine, auth)
        run: pnpm --filter @o11yfleet/core test

      - name: Site tests
        run: pnpm --filter @o11yfleet/site test

  test-slow:
    needs: [changes]
    if: needs.changes.outputs.slow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Worker tests (workerd runtime)
        run: pnpm --filter @o11yfleet/worker test:runtime

      - name: Install Playwright browser
        run: pnpm --filter @o11yfleet/ui-tests exec playwright install chromium

      - name: Run UI tests
        run: pnpm --filter @o11yfleet/ui-tests test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            tests/ui/playwright-report
            tests/ui/test-results
          if-no-files-found: ignore
          retention-days: 3

  deploy-validate:
    needs: [changes]
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: taiki-e/install-action@just

      - name: Build worker bundle
        run: just worker-bundle

      - name: "Check bundle size (Workers limit: 10MB compressed)"
        run: |
          MAX_GZIP=0
          MAX_BUNDLE=""
          MAX_RAW=0
          while IFS= read -r BUNDLE; do
            RAW=$(wc -c < "$BUNDLE" | tr -d ' ')
            GZ=$(gzip -c "$BUNDLE" | wc -c | tr -d ' ')
            echo "Bundle: $BUNDLE  Raw: $((RAW / 1024)) KB  Gzip: $((GZ / 1024)) KB"
            if [ "$GZ" -gt "$MAX_GZIP" ]; then
              MAX_GZIP=$GZ
              MAX_BUNDLE=$BUNDLE
              MAX_RAW=$RAW
            fi
          done < <(find apps/worker/dist \( -name '*.js' -o -name '*.mjs' \) 2>/dev/null)
          if [ -z "$MAX_BUNDLE" ]; then
            echo "No bundle found"
            exit 1
          fi
          echo ""
          echo "Largest bundle: $MAX_BUNDLE"
          echo "Raw size: $((MAX_RAW / 1024)) KB  |  Gzip: $((MAX_GZIP / 1024)) KB"
          if [ "$MAX_GZIP" -gt $((3 * 1024 * 1024)) ]; then
            echo "Bundle exceeds 3MB compressed budget ($((MAX_GZIP / 1024)) KB)"
            exit 1
          fi
          echo "Bundle size OK"

      - name: Terraform validate
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - run: just tf-validate

  deploy-staging:
    needs: [lint-typecheck, test-fast, test-slow, deploy-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.TERRAFORM_STAGING_DEPLOY_ENABLED == 'true' && needs.deploy-validate.result == 'success' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    environment: staging
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_ENDPOINT: ${{ vars.TF_STATE_ENDPOINT }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'auto' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TERRAFORM_STAGING_DEPLOY_ENABLED: ${{ vars.TERRAFORM_STAGING_DEPLOY_ENABLED }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - uses: taiki-e/install-action@just

      - name: Check staging deploy configuration
        run: |
          test -n "$TF_STATE_BUCKET"
          test -n "$TF_STATE_ENDPOINT"
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy staging infrastructure, Worker, migrations, and Pages
        run: just deploy-staging

      - name: Resolve staging Pages smoke targets
        id: staging-pages-smoke
        run: |
          {
            echo 'targets<<TARGETS'
            just --quiet env-pages-smoke-targets staging
            echo 'TARGETS'
          } >> "$GITHUB_OUTPUT"

      - name: Smoke test staging Pages
        uses: ./.github/actions/deploy-pages
        with:
          smoke-targets: ${{ steps.staging-pages-smoke.outputs.targets }}

      - name: Smoke test
        run: |
          WORKER_URL="$(just --quiet env-api-url staging)"
          API_SECRET="${{ secrets.API_SECRET }}"

          echo "=== Health check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/healthz")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "✓ Health check passed"

          echo "=== Seed demo tenant ==="
          SEED_RESP=$(curl -s -X POST "$WORKER_URL/auth/seed" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET")
          TENANT_ID=$(echo "$SEED_RESP" | jq -r '.tenantId')
          if [ "$TENANT_ID" = "null" ] || [ -z "$TENANT_ID" ]; then
            echo "Failed to seed: $SEED_RESP"
            exit 1
          fi
          echo "✓ Demo tenant: $TENANT_ID"

          echo "=== API smoke: create config (v1) ==="
          CONFIG=$(curl -s -X POST "$WORKER_URL/api/v1/configurations" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -d '{"name":"ci-smoke-config"}')
          CONFIG_ID=$(echo "$CONFIG" | jq -r '.id')
          if [ "$CONFIG_ID" = "null" ] || [ -z "$CONFIG_ID" ]; then
            echo "Failed to create config: $CONFIG"
            exit 1
          fi
          echo "✓ Created config: $CONFIG_ID"

          echo "=== API smoke: create enrollment token (v1) ==="
          TOKEN_RESP=$(curl -s -X POST "$WORKER_URL/api/v1/configurations/$CONFIG_ID/enrollment-token" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -d '{"label":"ci-smoke"}')
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.token')
          if [ -z "$TOKEN" ] || ! echo "$TOKEN" | grep -q "^fp_enroll_"; then
            echo "Failed to create enrollment token: $TOKEN_RESP"
            exit 1
          fi
          echo "✓ Created enrollment token"

          echo "=== API smoke: config stats (v1) ==="
          HTTP_STATUS=$(curl -s -o /tmp/stats.json -w "%{http_code}" "$WORKER_URL/api/v1/configurations/$CONFIG_ID/stats" \
            -H "Authorization: Bearer $API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Stats endpoint failed: HTTP $HTTP_STATUS"
            cat /tmp/stats.json
            exit 1
          fi
          echo "Stats: $(cat /tmp/stats.json)"
          echo "✓ Stats endpoint responding"

          echo ""
          echo "✓ All staging smoke tests passed"

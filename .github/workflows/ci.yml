name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "installers/**"
  workflow_dispatch:

jobs:
  test-install-script:
    name: Test on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - os: linux
            runner: ubuntu-24.04
            arch: amd64
          # macOS Apple Silicon (M1-M4)
          - os: macos
            runner: macos-15
            arch: arm64
          # macOS M3
          - os: macos
            runner: macos-14
            arch: arm64
          # Windows amd64
          - os: windows
            runner: windows-2022
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run installer (dry-run mode)
        if: matrix.os != 'windows'
        env:
          OTELCOL_VERSION: "0.151.0"
        shell: bash
        run: |
          chmod +x installers/install.sh
          ./installers/install.sh --dry-run --version "$OTELCOL_VERSION"

      - name: Run Windows installer (dry-run mode)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          OTELCOL_VERSION: "0.151.0"
        run: |
          powershell -ExecutionPolicy Bypass -File installers/install.ps1 -DryRun -Version "$env:OTELCOL_VERSION"

      - name: Verify binary download and checksum
        if: matrix.os != 'windows'
        shell: bash
        env:
          OTELCOL_VERSION: "0.151.0"
        run: |
          chmod +x installers/install.sh
          TEST_DIR="/tmp/o11y-test-$(date +%s)-$$"
          sudo ./installers/install.sh --version "$OTELCOL_VERSION" --token "fp_enroll_test_dry_run_token" --dir "$TEST_DIR"
          find /tmp -name "otelcol-contrib" -type f 2>/dev/null | head -1 | xargs -I{} test -x {} && echo "Binary is executable"
          sudo rm -rf "$TEST_DIR" 2>/dev/null || true

      - name: Verify Windows binary download and checksum
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          OTELCOL_VERSION: "0.151.0"
        run: |
          $TEST_DIR = "$env:TEMP\o11y-test-$(Get-Random)"
          powershell -ExecutionPolicy Bypass -File installers/install.ps1 -Version "$env:OTELCOL_VERSION" -Token "fp_enroll_test_dry_run_token" -InstallDir $TEST_DIR
          if (Test-Path "$TEST_DIR\bin\otelcol-contrib.exe") { Write-Host "Binary exists" }
          Remove-Item -Recurse -Force $TEST_DIR -ErrorAction SilentlyContinue

  shellcheck:
    name: ShellCheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable \
            installers/install.sh

  validate-checksum-flow:
    name: Validate checksum verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - "0.116.0"  # older format with .sha256 files
          - "0.151.0"   # newer format with checksums.txt
    steps:
      - uses: actions/checkout@v6
      - name: Test checksums for ${{ matrix.version }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ matrix.version }}"
          CHECKSUMS_URL="https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v${VERSION}/opentelemetry-collector-releases_otelcol-contrib_checksums.txt"
          CHECKSUMS=$(curl -sL "$CHECKSUMS_URL")

          echo "Testing Linux amd64..."
          HASH=$(echo "$CHECKSUMS" | grep " otelcol-contrib_${VERSION}_linux_amd64.tar.gz$" | cut -d' ' -f1 || true)
          if [ -z "$HASH" ]; then echo "SKIP: linux/amd64"; else echo "OK: linux/amd64 ($HASH)"; fi

          echo "Testing Darwin amd64..."
          HASH=$(echo "$CHECKSUMS" | grep " otelcol-contrib_${VERSION}_darwin_amd64.tar.gz$" | cut -d' ' -f1 || true)
          if [ -z "$HASH" ]; then echo "SKIP: darwin/amd64"; else echo "OK: darwin/amd64 ($HASH)"; fi

          echo "Testing Linux arm64..."
          HASH=$(echo "$CHECKSUMS" | grep " otelcol-contrib_${VERSION}_linux_arm64.tar.gz$" | cut -d' ' -f1 || true)
          if [ -z "$HASH" ]; then echo "SKIP: linux/arm64"; else echo "OK: linux/arm64 ($HASH)"; fi

          echo "Testing Darwin arm64..."
          HASH=$(echo "$CHECKSUMS" | grep " otelcol-contrib_${VERSION}_darwin_arm64.tar.gz$" | cut -d' ' -f1 || true)
          if [ -z "$HASH" ]; then echo "SKIP: darwin/arm64"; else echo "OK: darwin/arm64 ($HASH)"; fi

          echo "Testing Windows amd64..."
          HASH=$(echo "$CHECKSUMS" | grep " otelcol-contrib_${VERSION}_windows_amd64.tar.gz$" | cut -d' ' -f1 || true)
          if [ -z "$HASH" ]; then echo "SKIP: windows/amd64"; else echo "OK: windows/amd64 ($HASH)"; fi

          echo "Testing Windows arm64 (if version supports it)..."
          HASH=$(echo "$CHECKSUMS" | grep " otelcol-contrib_${VERSION}_windows_arm64.tar.gz$" | cut -d' ' -f1 || true)
          if [ -z "$HASH" ]; then echo "SKIP: windows/arm64"; else echo "OK: windows/arm64 ($HASH)"; fi

          echo "Checksum validation complete for v${VERSION}"
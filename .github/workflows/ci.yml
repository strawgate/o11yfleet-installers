name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-slim
    timeout-minutes: 3
    outputs:
      node: ${{ steps.filter.outputs.node }}
      fast: ${{ steps.filter.outputs.fast }}
      slow: ${{ steps.filter.outputs.slow }}
      deploy: ${{ steps.filter.outputs.deploy }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="${HEAD}^"
            fi
          else
            BASE="${{ github.sha }}^"
            HEAD="${{ github.sha }}"
          fi

          git diff --name-only "$BASE" "$HEAD" > changed-files.txt
          cat changed-files.txt

          has_match() {
            local pattern
            for pattern in "$@"; do
              if grep -Eq "$pattern" changed-files.txt; then
                return 0
              fi
            done
            return 1
          }

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          if has_match \
            '^(apps/(site|worker)|packages|tests|scripts|experiments)/' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig[^/]*\.json|\.oxlintrc\.json|vitest[^/]*\.config\.)' \
            '^justfile$'; then
            set_output node true
          else
            set_output node false
          fi

          if has_match \
            '^(apps/site|packages/core|packages/test-utils|scripts|tests/oracle)/' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig[^/]*\.json|\.oxlintrc\.json)' \
            '^justfile$'; then
            set_output fast true
          else
            set_output fast false
          fi

          if has_match \
            '^(apps/worker|packages/core|packages/db|packages/test-utils|tests/ui|tests/e2e|tests/e2e-collector|tests/opamp)/' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig[^/]*\.json|\.oxlintrc\.json|vitest[^/]*\.config\.)' \
            '^justfile$' \
            '^\.github/workflows/.*\.(yml|yaml)$'; then
            set_output slow true
          else
            set_output slow false
          fi

          if has_match \
            '^apps/worker/' \
            '^infra/terraform/' \
            '^justfile$' \
            '^(package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json)'; then
            set_output deploy true
          else
            set_output deploy false
          fi

          if has_match '^\.github/workflows/.*\.(yml|yaml)$' '^\.github/workflows/.*\.md$' '^\.github/actions/' '^\.github/actionlint\.ya?ml$'; then
            set_output workflow true
          else
            set_output workflow false
          fi

  fast:
    needs: [changes]
    if: >-
      ${{
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        (needs.changes.outputs.node == 'true' || needs.changes.outputs.workflow == 'true' ||
         needs.changes.outputs.fast == 'true' || needs.changes.outputs.deploy == 'true')
      }}
    runs-on: ubicloud-standard-4-arm
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflows
        if: needs.changes.outputs.workflow == 'true'
        run: |
          find .github/workflows \( -name '*.yml' -o -name '*.yaml' \) ! -name '*.lock.yml' -print0 |
            xargs -0 go run github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Ensure lock files only modified by gh-aw
        if: needs.changes.outputs.workflow == 'true'
        run: |
          # .lock.yml files should only be modified by gh aw compile
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.sha }}^"
            HEAD="${{ github.sha }}"
          fi
          lock_file_changes=$(git diff --name-only "$BASE" "$HEAD" -- '*.lock.yml' || true)
          if [ -n "$lock_file_changes" ]; then
            echo "ERROR: The following .lock.yml files were modified directly:"
            echo "$lock_file_changes"
            echo ""
            echo "Lock files must only be modified by running 'gh aw compile'"
            echo "Do NOT edit .lock.yml files directly - update the source .md files instead"
            exit 1
          fi
          echo "No direct .lock.yml modifications detected"

      - uses: pnpm/action-setup@v6
        if: needs.changes.outputs.node == 'true' || needs.changes.outputs.fast == 'true' || needs.changes.outputs.deploy == 'true'

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.node == 'true' || needs.changes.outputs.fast == 'true' || needs.changes.outputs.deploy == 'true'
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-go@v5
        if: needs.changes.outputs.fast == 'true'
        with:
          go-version: "1.23"
          cache-dependency-path: tests/oracle/go.sum

      - name: Install dependencies
        if: needs.changes.outputs.node == 'true' || needs.changes.outputs.fast == 'true' || needs.changes.outputs.deploy == 'true'
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Restore Turbo cache
        if: needs.changes.outputs.node == 'true'
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
            turbo-${{ runner.os }}-${{ runner.arch }}-

      - name: Lint
        if: needs.changes.outputs.node == 'true'
        run: pnpm turbo lint

      - name: Lint repo scripts
        if: needs.changes.outputs.node == 'true'
        run: pnpm lint:scripts

      - name: Type-aware lint
        if: needs.changes.outputs.node == 'true'
        run: pnpm lint:type-aware

      - name: Dead code detection (knip)
        if: needs.changes.outputs.node == 'true'
        run: pnpm knip

      - name: Dev-check script tests
        if: needs.changes.outputs.node == 'true'
        run: pnpm test:dev-check

      - name: Format check
        if: needs.changes.outputs.node == 'true'
        run: pnpm prettier --cache --cache-location node_modules/.cache/prettier/.prettier-cache --check .

      - name: Worker typegen drift check
        if: needs.changes.outputs.node == 'true'
        run: pnpm --filter @o11yfleet/worker typegen:check

      # Catches the bug class where wrangler.jsonc and Terraform's
      # worker_crons drift apart silently. Cheap (<200ms); gate on `node`
      # so any apps/worker, packages, or scripts change exercises it.
      - name: Cron drift check (wrangler.jsonc ↔ terraform variables.tf)
        if: needs.changes.outputs.node == 'true'
        run: pnpm tsx scripts/check-cron-drift.ts

      - name: Type check
        if: needs.changes.outputs.node == 'true'
        run: pnpm turbo typecheck

      - name: SQL binding audit
        if: needs.changes.outputs.node == 'true'
        run: pnpm tsx scripts/audit-sql-bindings.ts

      - name: Core tests (codec, state machine, auth, oracle)
        if: needs.changes.outputs.fast == 'true'
        run: pnpm --filter @o11yfleet/core test

      - name: Oracle tests (TS ↔ Go protobuf verification)
        if: needs.changes.outputs.fast == 'true'
        run: pnpm --filter @o11yfleet/oracle-tests test

      - name: Site tests
        if: needs.changes.outputs.fast == 'true'
        run: pnpm --filter @o11yfleet/site test

      - uses: ./.github/actions/setup-just
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'

      - name: Build worker bundle
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'
        run: |
          # Try wrangler dry-run first; if it fails due to auth, fall back to esbuild
          if just worker-bundle; then
            echo "Bundle built with wrangler"
          else
            echo "Wrangler build failed, trying esbuild fallback..."
            mkdir -p apps/worker/dist
            cd apps/worker
            pnpm exec esbuild src/instrumented.ts --bundle --outfile=dist/instrumented.js --format=esm --platform=browser --target=es2022 2>/dev/null || true
            if [ -f dist/instrumented.js ]; then
              echo "Bundle built with esbuild fallback"
            fi
          fi

      - name: "Check bundle size (Workers limit: 10MB compressed)"
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'
        run: |
          MAX_GZIP=0
          MAX_BUNDLE=""
          MAX_RAW=0
          while IFS= read -r BUNDLE; do
            RAW=$(wc -c < "$BUNDLE" | tr -d ' ')
            GZ=$(gzip -c "$BUNDLE" | wc -c | tr -d ' ')
            echo "Bundle: $BUNDLE  Raw: $((RAW / 1024)) KB  Gzip: $((GZ / 1024)) KB"
            if [ "$GZ" -gt "$MAX_GZIP" ]; then
              MAX_GZIP=$GZ
              MAX_BUNDLE=$BUNDLE
              MAX_RAW=$RAW
            fi
          done < <(find apps/worker/dist \( -name '*.js' -o -name '*.mjs' \) 2>/dev/null)
          if [ -z "$MAX_BUNDLE" ]; then
            echo "No bundle found"
            exit 1
          fi
          echo ""
          echo "Largest bundle: $MAX_BUNDLE"
          echo "Raw size: $((MAX_RAW / 1024)) KB  |  Gzip: $((MAX_GZIP / 1024)) KB"
          if [ "$MAX_GZIP" -gt $((3 * 1024 * 1024)) ]; then
            echo "Bundle exceeds 3MB compressed budget ($((MAX_GZIP / 1024)) KB)"
            exit 1
          fi
          echo "Bundle size OK"

      # Terraform validation runs whenever HCL OR the workflow itself
      # changes. Without the `workflow == 'true'` branch, an edit to
      # ci.yml that affects how validation runs would skip its own
      # validation (the deploy filter excludes .github/workflows/**).
      - name: Terraform validate
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'
        uses: ./.github/actions/setup-terraform
        with:
          terraform-version: "1.11"

      - run: just tf-validate
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'

      - name: Setup tflint
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          # Pin to a specific TFLint version for reproducible CI. Bump
          # intentionally; `latest` would resolve at run time and silently
          # change behavior across runs.
          tflint_version: v0.62.0

      - name: tflint init + run
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'
        working-directory: infra/terraform
        env:
          # Avoid GitHub API rate limits when fetching plugins on `tflint --init`.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tflint --init
          tflint --recursive --format compact

      - name: Verify terraform-docs README is up to date
        if: needs.changes.outputs.deploy == 'true' || needs.changes.outputs.workflow == 'true'
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform
          config-file: .terraform-docs.yml
          fail-on-diff: true
          # The action auto-commits in PR mode by default; we want a check
          # only — fail-on-diff above triggers a non-zero exit instead.
          git-push: false

  test-slow:
    needs: [changes]
    if: >-
      ${{
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        needs.changes.outputs.slow == 'true'
      }}
    runs-on: ubicloud-standard-4-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Worker tests (workerd runtime)
        run: pnpm --filter @o11yfleet/worker test:runtime

      - name: Install Playwright browser
        run: pnpm --filter @o11yfleet/ui-tests exec playwright install chromium

      - name: Run UI tests
        run: pnpm --filter @o11yfleet/ui-tests test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            tests/ui/playwright-report
            tests/ui/test-results
          if-no-files-found: ignore
          retention-days: 3

  integration-tests:
    needs: [changes]
    if: >-
      ${{
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        needs.changes.outputs.slow == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # Allows GitHub Actions to mint an OIDC token for the worker's
      # OIDC provision path (`POST /api/admin/tenants` accepts a
      # verified GitHub OIDC token as admin auth — see
      # `apps/worker/src/index.ts`). Tests don't currently use this
      # path; session login covers it. The permission is here so the
      # OIDC fallback is usable without another workflow edit.
      id-token: write
      contents: read
    # Hardcoded test fixtures (NOT real secrets). Set at job level so
    # the wrangler process started by start-worker-dev reads them at
    # startup, and downstream test steps inherit them without having
    # to redeclare each one.
    env:
      O11YFLEET_API_BEARER_SECRET: test-api-secret-for-dev-only-32chars
      O11YFLEET_CLAIM_HMAC_SECRET: test-claim-hmac-secret-for-ci-32ch
      O11YFLEET_SEED_ADMIN_EMAIL: admin@o11yfleet.com
      O11YFLEET_SEED_ADMIN_PASSWORD: admin-password
      O11YFLEET_SEED_TENANT_USER_EMAIL: demo@o11yfleet.com
      O11YFLEET_SEED_TENANT_USER_PASSWORD: demo-password
      # Tells the worker we're running locally so the CSRF gate
      # accepts http://localhost:8787 as a trusted origin (admin
      # routes need cookie auth, which is gated on trusted Origin).
      ENVIRONMENT: dev
      # Allow this repo's OIDC tokens through the provision path.
      O11YFLEET_OIDC_ALLOWED_REPOS: ${{ github.repository }}
      O11YFLEET_OIDC_AUDIENCE: o11yfleet
      FP_URL: http://localhost:8787
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations to local SQLite
        # Both /auth/seed and the seed-local.ts step below read/write
        # users + tenants. Without migrations, those tables don't exist
        # and the seed step 500s.
        run: cd apps/worker && CI=1 pnpm wrangler d1 migrations apply fp-db --local

      - name: Start worker (wrangler dev) and wait for /healthz
        uses: ./.github/actions/start-worker-dev

      - name: Seed local database
        run: |
          pnpm tsx scripts/with-local-env.ts -- pnpm tsx scripts/seed-local.ts --reset

      - name: E2E tests (full-stack with FakeOpampAgent)
        run: pnpm --filter @o11yfleet/e2e-tests test:e2e
        timeout-minutes: 10

      - name: OpAMP compliance tests
        run: pnpm --filter @o11yfleet/opamp-tests test:opamp
        timeout-minutes: 10

      - name: Stop worker
        if: always()
        run: |
          if [ -f /tmp/worker.pid ]; then
            kill "$(cat /tmp/worker.pid)" 2>/dev/null || true
          fi

      - name: Upload collector logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: collector-logs
          path: tests/e2e-collector/docker/*.log
          if-no-files-found: ignore
          retention-days: 3

  deploy-staging:
    needs: [fast, test-slow, integration-tests]
    runs-on: ubicloud-standard-2-arm
    timeout-minutes: 20
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.TERRAFORM_STAGING_DEPLOY_ENABLED == 'true' && needs.fast.result == 'success' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    environment: staging
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TFSTATE_WORKER_URL: ${{ vars.TFSTATE_WORKER_URL }}
      TFSTATE_USERNAME: ${{ secrets.TFSTATE_WORKER_USERNAME }}
      TFSTATE_PASSWORD: ${{ secrets.TFSTATE_WORKER_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEPLOY_ACCOUNT_ID }}
      TERRAFORM_STAGING_DEPLOY_ENABLED: ${{ vars.TERRAFORM_STAGING_DEPLOY_ENABLED }}
      O11YFLEET_API_BEARER_SECRET: ${{ secrets.O11YFLEET_API_BEARER_SECRET }}
      O11YFLEET_SEED_ADMIN_EMAIL: ${{ secrets.O11YFLEET_SEED_ADMIN_EMAIL }}
      O11YFLEET_SEED_ADMIN_PASSWORD: ${{ secrets.O11YFLEET_SEED_ADMIN_PASSWORD }}
      O11YFLEET_SEED_TENANT_USER_EMAIL: ${{ secrets.O11YFLEET_SEED_TENANT_USER_EMAIL }}
      O11YFLEET_SEED_TENANT_USER_PASSWORD: ${{ secrets.O11YFLEET_SEED_TENANT_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deploy

      - name: Check staging deploy configuration
        run: |
          test -n "$TFSTATE_WORKER_URL"
          test -n "$TFSTATE_USERNAME"
          test -n "$TFSTATE_PASSWORD"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$O11YFLEET_API_BEARER_SECRET"
          test -n "$O11YFLEET_SEED_ADMIN_EMAIL"
          test -n "$O11YFLEET_SEED_ADMIN_PASSWORD"
          test -n "$O11YFLEET_SEED_TENANT_USER_EMAIL"
          test -n "$O11YFLEET_SEED_TENANT_USER_PASSWORD"

      - name: Verify staging Terraform import/state readiness
        run: just tf-check-staging-readiness staging

      - name: Deploy staging infrastructure, static site, migrations, and Worker
        run: just deploy-staging

      - name: Resolve staging site smoke targets
        id: staging-site-smoke
        run: |
          {
            echo 'targets<<TARGETS'
            just --quiet env-site-smoke-targets staging
            echo 'TARGETS'
          } >> "$GITHUB_OUTPUT"

      - name: Smoke test staging site
        uses: ./.github/actions/smoke-site
        with:
          smoke-targets: ${{ steps.staging-site-smoke.outputs.targets }}

      - name: Smoke test staging API
        uses: ./.github/actions/smoke-api
        with:
          environment: staging
          origin: https://staging.o11yfleet.com
        env:
          O11YFLEET_API_BEARER_SECRET: ${{ secrets.O11YFLEET_API_BEARER_SECRET }}
          O11YFLEET_SEED_ADMIN_EMAIL: ${{ secrets.O11YFLEET_SEED_ADMIN_EMAIL }}
          O11YFLEET_SEED_ADMIN_PASSWORD: ${{ secrets.O11YFLEET_SEED_ADMIN_PASSWORD }}

      - name: Smoke test collector enrollment
        uses: ./.github/actions/smoke-collector
        with:
          worker-url: https://staging.o11yfleet.com
          concurrent-agents: "5"
        env:
          O11YFLEET_API_BEARER_SECRET: ${{ secrets.O11YFLEET_API_BEARER_SECRET }}
          O11YFLEET_SEED_ADMIN_EMAIL: ${{ secrets.O11YFLEET_SEED_ADMIN_EMAIL }}
          O11YFLEET_SEED_ADMIN_PASSWORD: ${{ secrets.O11YFLEET_SEED_ADMIN_PASSWORD }}

      - name: Smoke test token revocation
        uses: ./.github/actions/smoke-token-revocation
        with:
          worker-url: https://staging.o11yfleet.com
        env:
          O11YFLEET_API_BEARER_SECRET: ${{ secrets.O11YFLEET_API_BEARER_SECRET }}
          O11YFLEET_SEED_ADMIN_EMAIL: ${{ secrets.O11YFLEET_SEED_ADMIN_EMAIL }}
          O11YFLEET_SEED_ADMIN_PASSWORD: ${{ secrets.O11YFLEET_SEED_ADMIN_PASSWORD }}

      - name: Smoke test staging public aliases
        run: just smoke-aliases-ci staging

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-install-script:
    name: Test on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - os: linux
            runner: ubuntu-24.04
            arch: amd64
          # macOS Apple Silicon (M1-M4)
          - os: macos
            runner: macos-15
            arch: arm64
          # macOS Intel
          - os: macos
            runner: macos-13
            arch: amd64
          # Windows amd64
          - os: windows
            runner: windows-2022
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run installer (dry-run mode)
        if: matrix.os != 'windows'
        env:
          OTELCOL_VERSION: "0.116.0"
        shell: bash
        run: |
          chmod +x installers/install.sh
          ./installers/install.sh --dry-run --version "$OTELCOL_VERSION"

      - name: Run Windows installer (dry-run mode)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          OTELCOL_VERSION: "0.116.0"
        run: |
          powershell -ExecutionPolicy Bypass -File installers/install.ps1 -DryRun -Version "$OTELCOL_VERSION"

      - name: Verify binary download and checksum
        if: matrix.os != 'windows'
        shell: bash
        env:
          OTELCOL_VERSION: "0.116.0"
        run: |
          chmod +x installers/install.sh
          TEST_DIR="/tmp/o11y-test-$(date +%s)-$$"
          sudo ./installers/install.sh --version "$OTELCOL_VERSION" --token "fp_enroll_test_dry_run_token" --dir "$TEST_DIR"
          find /tmp -name "otelcol-contrib" -type f 2>/dev/null | head -1 | xargs -I{} test -x {} && echo "Binary is executable"
          sudo rm -rf "$TEST_DIR" 2>/dev/null || true

      - name: Verify Windows binary download and checksum
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          OTELCOL_VERSION: "0.116.0"
        run: |
          $TEST_DIR = "$env:TEMP\o11y-test-$(Get-Random)"
          powershell -ExecutionPolicy Bypass -File installers/install.ps1 -Version "$OTELCOL_VERSION" -Token "fp_enroll_test_dry_run_token" -InstallDir $TEST_DIR
          if (Test-Path "$TEST_DIR\bin\otelcol-contrib.exe") { Write-Host "Binary exists" }
          Remove-Item -Recurse -Force $TEST_DIR -ErrorAction SilentlyContinue

  shellcheck:
    name: ShellCheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable \
            installers/install.sh

  validate-checksum-flow:
    name: Validate checksum verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - "0.116.0"  # older format with .sha256 files
          - "0.151.0"   # newer format with checksums.txt
    steps:
      - uses: actions/checkout@v6
      - name: Test checksums for ${{ matrix.version }}
        shell: bash
        run: |
          VERSION="${{ matrix.version }}"
          CHECKSUMS_URL="https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v${VERSION}/opentelemetry-collector-releases_otelcol-contrib_checksums.txt"

          for ARCH in amd64 arm64; do
            for OS in linux darwin; do
              TARBALL="otelcol-contrib_${VERSION}_${OS}_${ARCH}.tar.gz"
              EXPECTED_HASH=$(curl -sL "$CHECKSUMS_URL" | grep " $TARBALL$" | cut -d' ' -f1)
              if [ -z "$EXPECTED_HASH" ]; then
                echo "SKIP: $OS/$ARCH not available for v${VERSION}"
                continue
              fi
              if ! echo "$EXPECTED_HASH" | grep -qE '^[a-f0-9]{64}$'; then
                echo "Invalid hash format: $EXPECTED_HASH"
                exit 1
              fi
              echo "✓ $OS/$ARCH: checksum valid for v${VERSION} (${EXPECTED_HASH:0:16}...)"
            done
          done

          # Windows - only check amd64 for older versions
          for ARCH in amd64; do
            TARBALL="otelcol-contrib_${VERSION}_windows_${ARCH}.tar.gz"
            EXPECTED_HASH=$(curl -sL "$CHECKSUMS_URL" | grep " $TARBALL$" | cut -d' ' -f1)
            if [ -z "$EXPECTED_HASH" ]; then
              echo "SKIP: windows/$ARCH not available for v${VERSION}"
              continue
            fi
            if ! echo "$EXPECTED_HASH" | grep -qE '^[a-f0-9]{64}$'; then
              echo "Invalid hash format: $EXPECTED_HASH"
              exit 1
            fi
            echo "✓ windows/$ARCH: checksum valid for v${VERSION} (${EXPECTED_HASH:0:16}...)"
          done

          # Windows ARM64 - only for newer versions
          if [ "$VERSION" = "0.151.0" ] || [ "$VERSION" = "0.150.0" ] || [ "$VERSION" = "0.149.0" ]; then
            TARBALL="otelcol-contrib_${VERSION}_windows_arm64.tar.gz"
            EXPECTED_HASH=$(curl -sL "$CHECKSUMS_URL" | grep " $TARBALL$" | cut -d' ' -f1)
            if [ -z "$EXPECTED_HASH" ]; then
              echo "SKIP: windows/arm64 not available for v${VERSION}"
            else
              echo "✓ windows/arm64: checksum valid for v${VERSION} (${EXPECTED_HASH:0:16}...)"
            fi
          else
            echo "SKIP: windows/arm64 requires v0.149.0+"
          fi
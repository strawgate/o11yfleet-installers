name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Format check
        run: pnpm prettier --check .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo typecheck

  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Core tests (codec, state machine, auth)
        run: pnpm --filter @o11yfleet/core test

  test-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Worker tests (workerd runtime)
        run: pnpm --filter @o11yfleet/worker test

  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build worker bundle
        run: |
          cd apps/worker
          npx wrangler deploy --dry-run --outdir dist 2>&1 | tail -20 || true

      - name: "Check bundle size (Workers limit: 10MB compressed)"
        run: |
          BUNDLE=$(find apps/worker/dist -name '*.js' -o -name '*.mjs' 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "⚠ No bundle found — skipping size check"
            exit 0
          fi
          RAW_SIZE=$(wc -c < "$BUNDLE" | tr -d ' ')
          GZIP_SIZE=$(gzip -c "$BUNDLE" | wc -c | tr -d ' ')
          echo "Bundle: $BUNDLE"
          echo "Raw size: $((RAW_SIZE / 1024)) KB"
          echo "Gzip size: $((GZIP_SIZE / 1024)) KB"
          # Workers limit: 10MB compressed for paid, 1MB free
          MAX_GZIP=$((3 * 1024 * 1024))  # 3MB compressed budget
          if [ "$GZIP_SIZE" -gt "$MAX_GZIP" ]; then
            echo "❌ Bundle exceeds 3MB compressed budget ($((GZIP_SIZE / 1024)) KB)"
            exit 1
          fi
          echo "✓ Bundle size OK"

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: pnpm tsx experiments/src/benchmark.ts 2>&1 | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Terraform validate
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
      - run: |
          cd infra/terraform
          terraform init -backend=false
          terraform validate

  test-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @o11yfleet/ui-tests exec playwright install --with-deps chromium

      - name: Run UI tests
        run: pnpm --filter @o11yfleet/ui-tests test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            tests/ui/playwright-report
            tests/ui/test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy-staging:
    needs: [lint-format, typecheck, test-core, test-worker, test-ui, bundle-size, terraform]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to staging
        run: pnpm --filter @o11yfleet/worker exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migrations (staging)
        run: pnpm --filter @o11yfleet/worker exec wrangler d1 migrations apply FP_DB --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        env:
          STAGING_API_SECRET: ${{ secrets.STAGING_API_SECRET || secrets.API_SECRET }}
        run: |
          WORKER_URL="${{ vars.STAGING_WORKER_URL }}"
          if [ -z "$STAGING_API_SECRET" ]; then
            echo "STAGING_API_SECRET or API_SECRET is required for authenticated staging smoke tests"
            exit 1
          fi
          echo "=== Health check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/healthz")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "✓ Health check passed"

          echo "=== API smoke: create tenant ==="
          TENANT=$(curl -s -X POST "$WORKER_URL/api/admin/tenants" \
            -H "Authorization: Bearer $STAGING_API_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-smoke-test"}')
          TENANT_ID=$(echo "$TENANT" | jq -r '.id')
          if [ "$TENANT_ID" = "null" ] || [ -z "$TENANT_ID" ]; then
            echo "Failed to create tenant: $TENANT"
            exit 1
          fi
          echo "✓ Created tenant: $TENANT_ID"

          echo "=== API smoke: create config ==="
          CONFIG=$(curl -s -X POST "$WORKER_URL/api/v1/configurations" \
            -H "Authorization: Bearer $STAGING_API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -H "Content-Type: application/json" \
            -d "{\"tenant_id\":\"$TENANT_ID\",\"name\":\"ci-smoke-config\"}")
          CONFIG_ID=$(echo "$CONFIG" | jq -r '.id')
          if [ "$CONFIG_ID" = "null" ] || [ -z "$CONFIG_ID" ]; then
            echo "Failed to create config: $CONFIG"
            exit 1
          fi
          echo "✓ Created config: $CONFIG_ID"

          echo "=== API smoke: create enrollment token ==="
          TOKEN_RESP=$(curl -s -X POST "$WORKER_URL/api/v1/configurations/$CONFIG_ID/enrollment-token" \
            -H "Authorization: Bearer $STAGING_API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID" \
            -H "Content-Type: application/json" \
            -d '{"label":"ci-smoke"}')
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.token')
          if [ -z "$TOKEN" ] || ! echo "$TOKEN" | grep -q "^fp_enroll_"; then
            echo "Failed to create enrollment token: $TOKEN_RESP"
            exit 1
          fi
          echo "✓ Created enrollment token"

          echo "=== API smoke: config stats ==="
          STATS_BODY=$(mktemp)
          STATS_STATUS=$(curl -s -o "$STATS_BODY" -w "%{http_code}" "$WORKER_URL/api/v1/configurations/$CONFIG_ID/stats" \
            -H "Authorization: Bearer $STAGING_API_SECRET" \
            -H "X-Tenant-Id: $TENANT_ID")
          if [ "$STATS_STATUS" != "200" ]; then
            echo "Config stats failed ($STATS_STATUS): $(cat "$STATS_BODY")"
            exit 1
          fi
          if ! jq -e '.total_agents != null and .connected_agents != null' "$STATS_BODY" >/dev/null; then
            echo "Config stats returned unexpected payload: $(cat "$STATS_BODY")"
            exit 1
          fi
          echo "Stats: $(cat "$STATS_BODY")"
          echo "✓ Stats endpoint responding"

          echo ""
          echo "✓ All staging smoke tests passed"

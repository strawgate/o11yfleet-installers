name: Smoke test site targets
description: >
  Smoke test one or more static site URLs using a headless browser.
  Best-effort: exits 0 with a warning when Cloudflare bot protection
  blocks headless traffic from CI runner IPs.

inputs:
  smoke-targets:
    description: Newline-delimited smoke targets as label|url.
    required: true

runs:
  using: composite
  steps:
    - name: Install Playwright chromium
      shell: bash
      run: |
        export PLAYWRIGHT_DIR="/tmp/playwright-smoke"
        mkdir -p "$PLAYWRIGHT_DIR"
        cd "$PLAYWRIGHT_DIR"
        npm init -y > /dev/null 2>&1
        npm install playwright@1.52.0
        npx playwright install --with-deps chromium

    - name: Smoke test site targets
      shell: bash
      env:
        SMOKE_TARGETS: ${{ inputs.smoke-targets }}
      run: |
        set -euo pipefail
        sleep 5

        # Write script into the playwright install dir so ESM resolves naturally
        cat > /tmp/playwright-smoke/smoke.mjs <<'SMOKE_SCRIPT'
        import { chromium } from "playwright";

        const targets = process.env.SMOKE_TARGETS.trim().split("\n").filter(Boolean);
        const browser = await chromium.launch();
        let allPassed = true;

        try {
          for (const line of targets) {
            const trimmed = line.replace(/\r$/, "");
            if (!trimmed.includes("|")) {
              console.error(`Malformed smoke target line; expected label|url: ${trimmed}`);
              process.exit(1);
            }
            const [surface, ...urlParts] = trimmed.split("|");
            const url = urlParts.join("|");
            if (!surface || !url) {
              console.error(`Malformed smoke target; label and url must both be non-empty: ${trimmed}`);
              process.exit(1);
            }
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
              console.error(`Malformed smoke target URL for ${surface}: ${url}`);
              process.exit(1);
            }

            console.log(`Testing ${surface}: ${url}`);
            const page = await browser.newPage();
            let lastError;

            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await page.goto(url, { waitUntil: "domcontentloaded", timeout: 20000 });
                // Wait for React to mount (handles CF challenge redirect if it resolves)
                await page.waitForSelector("#root", { timeout: 15000 });

                const stale = await page.locator("text=/Prototype|AI-powered insights are coming soon/").count();
                const staleCSS = await page.locator("link[href*='portal-shared.css']").count();
                if (stale > 0 || staleCSS > 0) {
                  throw new Error(`${surface} served stale prototype HTML`);
                }

                console.log(`  ✓ ${surface} OK (attempt ${attempt})`);
                lastError = null;
                break;
              } catch (err) {
                lastError = err;
                console.log(`  ${surface} attempt ${attempt} failed: ${err.message}`);
                if (attempt < 3) await new Promise(r => setTimeout(r, 3000));
              }
            }

            await page.close();
            if (lastError) {
              // Stale content is a hard failure — something is genuinely wrong
              if (lastError.message.includes("stale prototype")) {
                console.error(`${surface} smoke FAILED: ${lastError.message}`);
                process.exit(1);
              }
              // Timeouts / CF bot blocks are best-effort warnings from CI runner IPs
              console.log(`::warning title=Site smoke blocked::${surface} could not be verified from CI (${lastError.message}). Verify manually from a browser.`);
              allPassed = false;
            }
          }

          if (allPassed) {
            console.log("All site targets responding");
          } else {
            console.log("Some site targets could not be verified (likely CF bot protection). API smoke test is the authoritative check.");
          }
        } finally {
          await browser.close();
        }
        SMOKE_SCRIPT

        node /tmp/playwright-smoke/smoke.mjs

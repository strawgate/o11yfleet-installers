name: Smoke test site targets
description: Smoke test one or more static site URLs using a headless browser.

inputs:
  smoke-targets:
    description: Newline-delimited smoke targets as label|url.
    required: true

runs:
  using: composite
  steps:
    - name: Install Playwright chromium
      shell: bash
      run: |
        export PLAYWRIGHT_DIR="/tmp/playwright-smoke"
        mkdir -p "$PLAYWRIGHT_DIR"
        cd "$PLAYWRIGHT_DIR"
        npm init -y > /dev/null 2>&1
        npm install playwright@1.52.0
        npx playwright install --with-deps chromium

    - name: Smoke test site targets
      shell: bash
      env:
        SMOKE_TARGETS: ${{ inputs.smoke-targets }}
      run: |
        set -euo pipefail
        sleep 5

        # Write script into the playwright install dir so ESM resolves naturally
        cat > /tmp/playwright-smoke/smoke.mjs <<'SMOKE_SCRIPT'
        import { chromium } from "playwright";

        const targets = process.env.SMOKE_TARGETS.trim().split("\n").filter(Boolean);
        const browser = await chromium.launch();

        try {
          for (const line of targets) {
            const trimmed = line.replace(/\r$/, "");
            if (!trimmed.includes("|")) {
              console.error(`Malformed smoke target line; expected label|url: ${trimmed}`);
              process.exit(1);
            }
            const [surface, ...urlParts] = trimmed.split("|");
            const url = urlParts.join("|");
            if (!surface || !url) {
              console.error(`Malformed smoke target; label and url must both be non-empty: ${trimmed}`);
              process.exit(1);
            }
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
              console.error(`Malformed smoke target URL for ${surface}: ${url}`);
              process.exit(1);
            }

            console.log(`Testing ${surface}: ${url}`);
            const page = await browser.newPage();
            let lastError;

            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                // networkidle waits for CF challenge JS to complete if present
                const response = await page.goto(url, { waitUntil: "networkidle", timeout: 30000 });
                const status = response?.status() ?? 0;

                // CF challenge may redirect after JS execution
                if (status !== 200) {
                  if (status === 403) {
                    await page.waitForURL(url, { timeout: 15000 }).catch(() => {});
                  }
                  const finalContent = await page.content();
                  if (finalContent.includes("Just a moment")) {
                    throw new Error(`CF challenge did not resolve (HTTP ${status})`);
                  }
                }

                const root = await page.locator("#root").count();
                if (root === 0) {
                  const snippet = (await page.content()).slice(0, 500);
                  throw new Error(`Missing #root element. Page snippet: ${snippet}`);
                }

                const stale = await page.locator("text=/Prototype|AI-powered insights are coming soon/").count();
                const staleCSS = await page.locator("link[href*='portal-shared.css']").count();
                if (stale > 0 || staleCSS > 0) {
                  throw new Error(`${surface} served stale prototype HTML`);
                }

                console.log(`  ✓ ${surface} OK (attempt ${attempt})`);
                lastError = null;
                break;
              } catch (err) {
                lastError = err;
                console.log(`  ${surface} attempt ${attempt} failed: ${err.message}`);
                if (attempt < 5) await new Promise(r => setTimeout(r, 3000));
              }
            }

            await page.close();
            if (lastError) {
              console.error(`${surface} smoke failed after 5 attempts: ${lastError.message}`);
              process.exit(1);
            }
          }

          console.log("Site targets responding");
        } finally {
          await browser.close();
        }
        SMOKE_SCRIPT

        node /tmp/playwright-smoke/smoke.mjs

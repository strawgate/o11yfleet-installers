name: Setup deployment toolchain
description: Install the shared toolchain used by o11yFleet deployment jobs.

inputs:
  node-version:
    description: Node.js version to install.
    default: "22"
  terraform-version:
    description: Terraform version to install.
    default: "1.9"
  install-dependencies:
    description: Install pnpm workspace dependencies.
    default: "true"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      if: ${{ inputs.install-dependencies == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - uses: taiki-e/install-action@51cd0b8c0499559d9a4d75c0f5c67bec3a894ec8 # v2.75.28
      with:
        tool: just

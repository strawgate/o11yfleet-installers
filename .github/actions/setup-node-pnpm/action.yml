name: Setup Node.js with pnpm
description: Setup Node.js and pnpm package manager with caching.

inputs:
  node-version:
    description: Node.js version to install.
    default: "22"
  pnpm-version:
    description: pnpm version to install globally.
    default: "9"
  cache:
    description: Enable pnpm cache. Use 'pnpm' to cache node_modules.
    default: "pnpm"
  install:
    description: Run pnpm install after setup.
    default: "true"

runs:
  using: composite
  steps:
    - name: Install pnpm
      shell: bash
      run: npm install -g pnpm@${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

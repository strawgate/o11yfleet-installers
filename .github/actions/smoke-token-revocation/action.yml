name: Smoke token revocation
description: |
  Verify that revoked enrollment tokens are properly rejected and that
  previously enrolled agents remain connected after revocation.

inputs:
  worker-url:
    description: "Base URL of the worker"
    required: true
  config-name:
    description: Name for the temporary smoke config.
    default: ci-smoke-revocation

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Smoke token revocation
      shell: bash
      env:
        WORKER_URL: ${{ inputs.worker-url }}
        CONFIG_NAME: ${{ inputs.config-name }}
        O11YFLEET_API_BEARER_SECRET: ${{ env.O11YFLEET_API_BEARER_SECRET }}
        O11YFLEET_SEED_ADMIN_EMAIL: ${{ env.O11YFLEET_SEED_ADMIN_EMAIL }}
        O11YFLEET_SEED_ADMIN_PASSWORD: ${{ env.O11YFLEET_SEED_ADMIN_PASSWORD }}
      run: |
        set -euo pipefail

        : "${O11YFLEET_API_BEARER_SECRET:?Set O11YFLEET_API_BEARER_SECRET}"
        : "${O11YFLEET_SEED_ADMIN_EMAIL:?Set O11YFLEET_SEED_ADMIN_EMAIL}"
        : "${O11YFLEET_SEED_ADMIN_PASSWORD:?Set O11YFLEET_SEED_ADMIN_PASSWORD}"

        pnpm tsx scripts/smoke-token-revocation/run.ts
